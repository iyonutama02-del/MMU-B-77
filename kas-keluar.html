<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e0e5ec" id="meta-theme-color">
    <title>Kas Keluar Institusi - MMU B-77</title>
    
    <link rel="icon" type="image/png" href="Logo-Favicon.png">
    <link rel="apple-touch-icon" href="Logo-Favicon.png">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        const role = localStorage.getItem('hakAkses');
        if(role === 'Operator' || role === 'Demo') {
            alert("🔒 AKSES DIBATASI: Menu ini hanya untuk Administrator.");
            window.location.replace('beranda.html');
        }
    </script>

    <style>
        /* --- TEMA NEUMORPHISM PREMIUM --- */
        :root {
            --bg-main: #e0e5ec; --text-dark: #31344b; --text-muted: #8C96A3;
            --shadow-dark: rgba(163, 177, 198, 0.6); --shadow-light: rgba(255, 255, 255, 0.6);
            --red-grad: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --c-red: #ff758c; --c-blue: #4facfe; --c-green: #00d26a;
            --border-line: rgba(140, 150, 163, 0.2);
        }
        [data-theme="dark"] { 
            --bg-main: #2d3748; --text-dark: #f0f4f8; --text-muted: #a0aec0; 
            --shadow-light: #3a4556; --shadow-dark: #202835; 
            --red-grad: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            --c-red: #ef4444;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: var(--bg-main); font-family: 'Poppins', sans-serif; color: var(--text-dark); user-select: none; padding-bottom: 50px; transition: 0.3s; }
        .app-container { max-width: 600px; margin: 0 auto; min-height: 100vh; padding: 25px 20px; animation: fadeIn 0.4s ease-out forwards;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #toast { visibility: hidden; min-width: 280px; background-color: #31344b; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; font-size: 12px; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: 600; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s forwards; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* HEADER */
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .btn-icon { width: 45px; height: 45px; border-radius: 15px; background: var(--bg-main); display: flex; justify-content: center; align-items: center; color: var(--text-dark); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); cursor: pointer; border: none; font-size: 16px; transition: 0.2s;}
        .btn-icon:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .header-title { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 900; margin: 0; color: var(--text-dark); text-transform: uppercase; letter-spacing: 1px;}

        /* WIDGET SALDO & PENGELUARAN */
        .expense-widget { background: var(--red-grad); border-radius: 25px; padding: 25px; color: white; margin-bottom: 25px; box-shadow: 8px 8px 16px rgba(255, 117, 140, 0.3); position: relative; overflow: hidden;}
        .expense-widget::before { content:''; position:absolute; right:-20px; top:-20px; width:100px; height:100px; background:rgba(255,255,255,0.1); border-radius:50%; }
        .balance-guard { background: rgba(0,0,0,0.15); border-radius: 15px; padding: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; backdrop-filter: blur(5px);}

        /* FORM INPUTS */
        .form-card { background: var(--bg-main); border-radius: 25px; padding: 25px; margin-bottom: 25px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); }
        .input-group { margin-bottom: 20px; position: relative;}
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; margin-left: 5px; }
        .input-edit { width: 100%; padding: 15px 20px; border: none; border-radius: 15px; background: var(--bg-main); font-family: 'Poppins', sans-serif; font-size: 13px; color: var(--text-dark); font-weight: 600; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); outline: none; transition: 0.3s; appearance: none; }
        .input-edit:focus { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 2px rgba(255, 117, 140, 0.4); }
        .input-readonly { background: transparent; color: var(--text-muted); pointer-events: none; box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);}

        .btn-submit { width: 100%; padding: 16px; background: var(--red-grad); color: white; border: none; border-radius: 15px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 5px 5px 15px rgba(255, 117, 140, 0.4); display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s;}
        .btn-submit:active { transform: translateY(2px); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }
        .btn-submit:disabled { background: var(--shadow-dark); color: var(--text-muted); box-shadow: none; cursor: not-allowed; transform: none;}

        /* HISTORY LIST */
        .history-section { margin-top: 10px; }
        .history-item { background: var(--bg-main); padding: 18px 20px; border-radius: 18px; margin-bottom: 15px; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--c-red); }
        .history-item h4 { margin: 0 0 3px 0; font-family: 'Montserrat'; font-size: 13px; color: var(--text-dark); }
        .history-item p { margin: 0; font-size: 10px; font-weight: 600; color: var(--text-muted); }
        .h-price { font-family: 'Montserrat'; font-weight: 900; font-size: 15px; color: var(--c-red); }

        /* MODAL SUKSES */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224, 229, 236, 0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        [data-theme="dark"] .modal-overlay { background: rgba(45, 55, 72, 0.85); }
        .modal-content { background: var(--bg-main); width: 100%; max-width: 350px; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 10px 10px 30px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>

    <div id="toast"><span>Pesan</span></div>

    <div class="app-container">
        <div class="nav-top">
            <button class="btn-icon" onclick="window.location.href='beranda.html'"><i class="fa-solid fa-angle-left"></i></button>
            <h1 class="header-title">Mutasi Kas Keluar</h1>
            <div style="width: 45px;"></div>
        </div>

        <div class="expense-widget">
            <p style="margin:0; font-size:10px; font-weight:700; opacity:0.8; text-transform:uppercase; letter-spacing: 1px;">Pengeluaran Keseluruhan</p>
            <h2 id="totalKeluar" style="margin:5px 0 0; font-family:'Montserrat'; font-weight:900; font-size:28px;">Rp 0</h2>
            
            <div class="balance-guard">
                <span><i class="fa-solid fa-shield-halved"></i> SALDO KAS UTAMA</span>
                <span id="txtSaldoGuard">Rp 0</span>
            </div>
        </div>

        <div class="form-card">
            <form id="formKasKeluar">
                <div class="input-group">
                    <label>Admin/Penanggung Jawab (Otomatis)</label>
                    <input type="text" class="input-edit input-readonly" id="outKasir" readonly>
                </div>
                <div class="input-group">
                    <label>Pos Anggaran (Sinkron Master)</label>
                    <select class="input-edit" id="outKode" required>
                        <option value="">-- Memuat Kategori --</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Nominal Pengeluaran (Rp)</label>
                    <input type="number" class="input-edit" id="outNominal" placeholder="0" required oninput="validasiSaldo()">
                    <p id="msgError" style="font-size:10px; color:var(--c-red); margin:8px 0 0 5px; display:none; font-weight:700;"><i class="fa-solid fa-triangle-exclamation"></i> Saldo Kas Tidak Mencukupi!</p>
                </div>
                <div class="input-group">
                    <label>Diberikan Kepada / Keperluan (Nota)</label>
                    <input type="text" class="input-edit" id="outPenerima" placeholder="Cth: Toko Alat Tulis / Nama Guru" required>
                </div>
                <div class="input-group">
                    <label>Keterangan Tambahan</label>
                    <textarea class="input-edit" id="outKet" style="height: 100px; padding:15px; resize:none;" placeholder="Cth: Pembelian sapu dan alat kebersihan"></textarea>
                </div>
                <button type="submit" class="btn-submit" id="btnSimpan">
                    <i class="fa-solid fa-money-bill-transfer"></i> SIMPAN PENGELUARAN
                </button>
            </form>
        </div>

        <div class="history-section">
            <p style="font-size:11px; font-weight:800; color:var(--text-muted); margin-bottom:15px; text-transform:uppercase; padding-left:5px; letter-spacing: 0.5px;">Riwayat Pengeluaran Terakhir</p>
            <div id="wadahHistory"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalSukses">
        <div class="modal-content">
            <div style="width:70px; height:70px; background:rgba(255, 117, 140, 0.1); color:var(--c-red); border-radius:50%; display:flex; justify-content:center; align-items:center; margin:0 auto 20px;">
                <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:30px;"></i>
            </div>
            <h2 style="font-family:'Montserrat'; margin:0 0 10px; color:var(--text-dark); font-weight:900;">Berhasil Dicatat!</h2>
            <p style="font-size:12px; margin-bottom:25px; color:var(--text-muted); font-weight:600;">Dana telah resmi dipotong dari Buku Kas Utama Madrasah.</p>
            <button class="btn-submit" style="border-radius:15px; background: var(--c-green); box-shadow: 4px 4px 10px rgba(0, 210, 106, 0.3);" onclick="location.reload()"><i class="fa-solid fa-check-double"></i> Selesai & Tutup</button>
        </div>
    </div>

    <script>
        let saldoTersedia = 0; // Deep Memory Variable
        function formatRupiah(n) { return 'Rp ' + parseInt(n || 0).toLocaleString('id-ID'); }
        function showToast(msg) { let t = document.getElementById("toast"); t.querySelector("span").innerText = msg; t.className = "show"; setTimeout(() => { t.className = ""; }, 3000); }

        window.onload = function() {
            // Set Nama Kasir
            document.getElementById('outKasir').value = localStorage.getItem('namaPengguna') || 'Admin Keuangan';

            // Sinkron Master Kode (Hanya Jenis Pengeluaran)
            database.ref('kode_keuangan').on('value', snap => {
                let opt = '<option value="">-- Pilih Pos Pengeluaran --</option>';
                snap.forEach(c => {
                    let k = c.val();
                    if((k.Jenis === 'Pengeluaran' || k.Jenis === 'Keluar') && k.Status !== 'Nonaktif') {
                        opt += `<option value="${c.key}">${c.key} - ${k.Nama_Pos}</option>`;
                    }
                });
                document.getElementById('outKode').innerHTML = opt;
            });

            // Sinkron Saldo & Riwayat (Deep Validate)
            database.ref('buku_kas').on('value', snap => {
                let totalMasuk = 0; let totalKeluar = 0; let html = '';
                let tempHist = [];

                snap.forEach(c => {
                    let d = c.val();
                    let nom = parseInt(d.Nominal || 0);
                    if(d.Jenis === 'MASUK') {
                        totalMasuk += nom;
                    } else if(d.Jenis === 'KELUAR') {
                        totalKeluar += nom;
                        tempHist.push(d); // Simpan untuk diurutkan
                    }
                });

                // Kalkulasi Saldo Mutlak
                saldoTersedia = totalMasuk - totalKeluar;
                document.getElementById('txtSaldoGuard').innerText = formatRupiah(saldoTersedia);
                document.getElementById('totalKeluar').innerText = formatRupiah(totalKeluar);

                // Urutkan History (Terbaru di atas, batasi 10)
                tempHist.sort((a,b) => new Date(b.Waktu.split(',')[0].split('/').reverse().join('-')) - new Date(a.Waktu.split(',')[0].split('/').reverse().join('-')));
                tempHist.slice(0, 10).forEach(d => {
                    html += `<div class="history-item">
                        <div><h4>${d.Penerima || 'Pengeluaran'}</h4><p>${d.Kategori_Nama} • ${d.Waktu.split(',')[0]}</p></div>
                        <div class="h-price">-${formatRupiah(d.Nominal)}</div>
                    </div>`;
                });

                document.getElementById('wadahHistory').innerHTML = html || '<p style="text-align:center; font-size:12px; color:var(--text-muted); font-weight:600; padding:20px;">Belum ada riwayat pengeluaran.</p>';
            });
        };

        // VALIDASI SALDO REAL-TIME (DEEP GUARD)
        function validasiSaldo() {
            let nomInput = parseInt(document.getElementById('outNominal').value) || 0;
            let btn = document.getElementById('btnSimpan');
            let msg = document.getElementById('msgError');
            
            // Kunci tombol jika input minus, 0, atau lebih besar dari saldo
            if(nomInput > saldoTersedia) {
                btn.disabled = true; msg.style.display = 'block'; msg.innerText = "🚨 Saldo Kas Tidak Mencukupi!";
            } else if (nomInput <= 0) {
                btn.disabled = true; msg.style.display = 'none';
            } else {
                btn.disabled = false; msg.style.display = 'none';
            }
        }

        // EKSEKUSI PENYIMPANAN DUAL-PATH (JURNAL KAS + RIWAYAT PENGELUARAN)
        document.getElementById('formKasKeluar').onsubmit = async (e) => {
            e.preventDefault();
            
            // Validasi lapis akhir sebelum menekan OK
            let nomInput = parseInt(document.getElementById('outNominal').value) || 0;
            if(nomInput > saldoTersedia) {
                showToast("Aksi Ditolak: Saldo tidak cukup!"); return;
            }

            if(!confirm("PERINGATAN: Dana akan dipotong permanen dari kas madrasah. Lanjutkan?")) return;

            const btn = document.getElementById('btnSimpan');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> MEMPOSTING JURNAL...';

            try {
                let ts = new Date().getTime();
                let waktu = new Date().toLocaleString('id-ID');
                let idKSK = "KSK-" + ts;
                let nominal = parseInt(document.getElementById('outNominal').value);
                let penerima = document.getElementById('outPenerima').value;
                let ket = document.getElementById('outKet').value || "-";
                let admin = document.getElementById('outKasir').value;
                let sel = document.getElementById('outKode');
                let katNama = sel.options[sel.selectedIndex].text.split(' - ')[1];

                let dataObj = {
                    ID_Transaksi: idKSK, Waktu: waktu, Kategori_Nama: katNama,
                    Nominal: nominal, Penerima: penerima, Keterangan: ket,
                    Admin_Penerima: admin, Jenis: 'KELUAR' // Samakan format field admin agar sejalan dengan kas masuk
                };

                let updates = {};
                updates[`kas_keluar/${idKSK}`] = dataObj;
                updates[`buku_kas/${idKSK}`] = dataObj; // Tembak langsung ke Jurnal Induk

                await database.ref().update(updates);
                
                // Munculkan Modal Sukses (Tidak pakai alert kaku)
                document.getElementById('modalSukses').style.display = 'flex';
                
            } catch(err) {
                showToast("Kesalahan Server Firebase: " + err.message);
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-money-bill-transfer"></i> SIMPAN PENGELUARAN';
            }
        };
    </script>
</body>
</html>
