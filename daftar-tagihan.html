<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e0e5ec" id="meta-theme-color">
    <title>Daftar Tunggakan - MMU B-77</title>
    
    <link rel="icon" type="image/png" href="Logo-Favicon.png">
    <link rel="apple-touch-icon" href="Logo-Favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>

    <style>
        /* --- TEMA NEUMORPHISM PREMIUM --- */
        :root {
            --bg-main: #e0e5ec; --text-dark: #31344b; --text-muted: #8C96A3;
            --shadow-dark: rgba(163, 177, 198, 0.6); --shadow-light: rgba(255, 255, 255, 0.6);
            --green-grad: linear-gradient(135deg, #2df077 0%, #00d26a 100%);
            --c-green: #00d26a; --c-blue: #4facfe; --c-red: #ef4444; --c-orange: #f59e0b;
            --border-line: rgba(140, 150, 163, 0.2);
        }
        [data-theme="dark"] {
            --bg-main: #2d3748; --text-dark: #f0f4f8; --text-muted: #a0aec0;
            --shadow-dark: #202835; --shadow-light: #3a4556;
            --border-line: rgba(255, 255, 255, 0.1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: var(--bg-main); font-family: 'Poppins', sans-serif; color: var(--text-dark); padding-bottom: 50px; transition: 0.3s; }
        .app-container { max-width: 1000px; margin: 0 auto; padding: 25px 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* HEADER */
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .btn-icon { width: 45px; height: 45px; border-radius: 15px; background: var(--bg-main); display: flex; justify-content: center; align-items: center; color: var(--text-dark); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); transition: 0.2s; cursor: pointer; border: none; font-size: 16px; }
        .btn-icon:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .header-title { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 900; margin: 0; color: var(--text-dark); text-transform: uppercase; letter-spacing: 1px;}

        /* TOAST */
        #toast { visibility: hidden; min-width: 250px; background-color: #31344b; color: #fff; text-align: center; border-radius: 15px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; font-size: 12px; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: 600; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s forwards; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* PANEL FILTER */
        .panel-card { background: var(--bg-main); border-radius: 25px; padding: 25px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); display: flex; gap: 20px; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 25px;}
        .filter-group { display: flex; gap: 15px; flex: 1; min-width: 300px; }
        .search-wrapper { display: flex; flex: 2; position: relative; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px;}
        .input-edit { width: 100%; padding: 16px 20px 16px 50px; border: none; border-radius: 15px; background: var(--bg-main); font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-dark); box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); outline: none; transition: 0.3s; appearance: none;}
        .input-edit:focus { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 2px rgba(245, 158, 11, 0.3); }
        .select-edit { padding: 16px 20px; flex: 1; cursor: pointer; }

        .btn-action { padding: 16px 25px; border: none; border-radius: 15px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; color: white; }
        .btn-excel { background: var(--green-grad); box-shadow: 5px 5px 15px rgba(0, 210, 106, 0.4); }
        .btn-pdf { background: var(--c-red); box-shadow: 5px 5px 15px rgba(239, 68, 68, 0.4); }
        .btn-action:active { transform: translateY(2px); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }

        /* SUMMARY CARD */
        .summary-card { background: var(--bg-main); border-radius: 25px; padding: 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); border-left: 5px solid var(--c-red); }
        .summary-info p { margin: 0 0 5px 0; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .summary-info h3 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 900; color: var(--c-red); }
        .summary-icon { width: 60px; height: 60px; border-radius: 18px; background: var(--bg-main); color: var(--c-red); font-size: 28px; display: flex; justify-content: center; align-items: center; box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }

        /* TABLE */
        .table-wrapper { background: var(--bg-main); border-radius: 25px; padding: 15px; box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; font-size: 12px; text-align: left; }
        th { color: var(--text-muted); font-weight: 800; padding: 18px 15px; border-bottom: 2px dashed var(--border-line); font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        td { padding: 18px 15px; border-bottom: 1px solid var(--border-line); color: var(--text-dark); font-weight: 500; }
        tr:last-child td { border-bottom: none; }
        
        .text-right { text-align: right; }
        .text-bold { font-weight: 900; font-family: 'Montserrat', sans-serif; font-size: 14px; color: var(--c-red); }
        
        .badge-tunggakan { background: rgba(239, 68, 68, 0.1); color: var(--c-red); padding: 6px 12px; border-radius: 10px; font-weight: 800; font-family: 'Montserrat'; font-size: 10px; text-transform: uppercase;}
        .badge-cicilan { background: rgba(245, 158, 11, 0.1); color: var(--c-orange); padding: 6px 12px; border-radius: 10px; font-weight: 800; font-family: 'Montserrat'; font-size: 10px; text-transform: uppercase;}
        
        .btn-wa { background: var(--green-grad); color: white; padding: 10px 15px; border-radius: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; font-family: 'Poppins'; box-shadow: 4px 4px 10px rgba(0, 210, 106, 0.3); transition: 0.2s; }
        .btn-wa:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); transform: translateY(2px); }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); font-weight: 600; font-size: 13px; }
        .neumorphic-spinner { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-main); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); border: 4px solid transparent; border-top-color: var(--c-red); animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* PRINT MODE */
        .print-header { display: none; text-align: center; border-bottom: 3px solid black; padding-bottom: 15px; margin-bottom: 20px; }
        .print-header h1 { font-family: 'Times New Roman', serif; font-size: 22px; margin: 0; font-weight: bold; text-transform: uppercase; }
        .print-header p { font-family: 'Times New Roman', serif; font-size: 12px; margin: 3px 0 0; }

        @media print {
            body { background: white; color: black; padding: 0; }
            .nav-top, .panel-card, .btn-icon { display: none !important; }
            .summary-card { box-shadow: none !important; border: 1px solid black !important; border-radius: 0; padding: 10px; margin-bottom: 15px; }
            .summary-icon { display: none !important; }
            .table-wrapper { box-shadow: none !important; padding: 0 !important; border-radius: 0; }
            table { width: 100%; border-collapse: collapse; font-size: 10px !important; }
            table, th, td { border: 1px solid black !important; }
            th { background-color: #f2f2f2 !important; color: black !important; -webkit-print-color-adjust: exact; }
            .kolom-aksi { display: none !important; }
            .badge-tunggakan, .badge-cicilan { background: transparent !important; color: black !important; padding: 0; }
            .print-header { display: block !important; }
        }
    </style>
</head>
<body>

    <div id="toast"><span>Pesan</span></div>

    <div class="app-container">
        
        <div class="nav-top">
            <button class="btn-icon" onclick="window.location.href='beranda.html'"><i class="fa-solid fa-angle-left"></i></button>
            <h1 class="header-title">Riwayat Tunggakan</h1>
            <div style="width: 45px;"></div>
        </div>

        <div class="panel-card">
            <div class="filter-group">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" class="input-edit" id="searchInput" placeholder="Cari nama santri atau NIS..." onkeyup="terapkanFilter()">
                </div>
                <select class="input-edit select-edit" id="filterKelas" onchange="terapkanFilter()">
                    <option value="SEMUA">Semua Kelas</option>
                </select>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn-action btn-excel" onclick="exportExcel()"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
                <button class="btn-action btn-pdf" onclick="window.print()"><i class="fa-solid fa-print"></i> Cetak PDF</button>
            </div>
        </div>

        <div id="print-area">
            <div class="print-header" id="pdfHeader">
                <h1 id="judulLaporanPdf">Laporan Rekapitulasi Tunggakan Santri</h1>
                <p>Madrasah Miftahul Ulum B-77 Jrebeng Kulon</p>
                <p style="margin-top: 5px; font-weight: bold;" id="tglCetak">Dicetak pada: -</p>
            </div>

            <div class="summary-card">
                <div class="summary-info">
                    <p id="teksRingkasan">Total Piutang Berjalan (Belum Lunas & Cicilan)</p>
                    <h3 id="totalPiutang">Rp 0</h3>
                </div>
                <div class="summary-icon">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="tabelTagihan">
                    <thead>
                        <tr>
                            <th>Tgl Dibuat</th>
                            <th>ID / Nama Santri</th>
                            <th>Kelas</th>
                            <th>Rincian Tagihan</th>
                            <th class="text-right">Sisa Hutang (Rp)</th>
                            <th>Status</th>
                            <th class="kolom-aksi" style="text-align:center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-body">
                        <tr><td colspan="7"><div class="empty-state"><div class="neumorphic-spinner"></div>Sinkronisasi Firebase Realtime...</div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let dbTagihan = []; 
        let dbSantriUtama = []; // REFERENSI MUTLAK NAMA DAN WA
        
        const formatRp = (angka) => 'Rp ' + parseInt(angka || 0).toLocaleString('id-ID');
        function showToast(msg) { let t = document.getElementById("toast"); t.querySelector("span").innerText = msg; t.className = "show"; setTimeout(() => { t.className = ""; }, 3000); }

        window.onload = function() {
            // SINKRONISASI 2 ARAH
            database.ref('santri').on('value', snap => {
                dbSantriUtama = []; snap.forEach(c => dbSantriUtama.push(c.val()));
                if(dbTagihan.length > 0) prosesDataAwal();
            });

            database.ref('tagihan').on('value', snap => {
                dbTagihan = [];
                snap.forEach(c => {
                    let t = c.val();
                    if(t.Status === 'Belum Lunas' || t.Status === 'Cicilan') dbTagihan.push(t);
                });
                if(dbSantriUtama.length > 0) prosesDataAwal();
            });
            
            // Set tanggal cetak untuk print
            let now = new Date();
            document.getElementById('tglCetak').innerText = "Dicetak pada: " + now.toLocaleDateString('id-ID') + " " + now.toLocaleTimeString('id-ID');
        };

        function prosesDataAwal() {
            // Siapkan Dropdown Kelas
            let setKelas = new Set();
            dbTagihan.forEach(row => { if(row.Kelas) setKelas.add(row.Kelas); });
            
            let valSekarang = document.getElementById('filterKelas').value;
            let optKelas = '<option value="SEMUA">-- Semua Kelas --</option>';
            Array.from(setKelas).sort().forEach(k => { optKelas += `<option value="${k}">Kelas ${k}</option>`; });
            document.getElementById('filterKelas').innerHTML = optKelas;
            if(Array.from(setKelas).includes(valSekarang)) document.getElementById('filterKelas').value = valSekarang;

            terapkanFilter();
        }

        // FUNGSI PENGUNCI NAMA MUTLAK DARI DATABASE SANTRI
        function getInfoMutlak(idMurid) {
            let santri = dbSantriUtama.find(s => String(s.ID_Murid) === String(idMurid));
            if (santri) return { nama: (santri.Nama_Lengkap || santri.Nama_Santri || "Tanpa Nama"), wa: santri.WA_Wali || "" };
            return { nama: "Hamba Allah", wa: "" };
        }

        function formatWA(noWA) {
            if(!noWA) return '';
            let strWA = String(noWA).replace(/\D/g,'');
            if(strWA.startsWith('0')) return '62' + strWA.substring(1);
            return strWA;
        }

        function terapkanFilter() {
            let inputCari = document.getElementById("searchInput").value.toLowerCase();
            let filterKls = document.getElementById("filterKelas").value;
            let tabelBody = document.getElementById('tabel-body');
            
            let totalTunggakan = 0;

            let hasilSaring = dbTagihan.filter(row => {
                let info = getInfoMutlak(row.ID_Murid);
                let idM = String(row.ID_Murid).toLowerCase();
                let namaM = info.nama.toLowerCase();
                let klsM = String(row.Kelas || "").toLowerCase();
                
                let matchText = idM.includes(inputCari) || namaM.includes(inputCari) || klsM.includes(inputCari);
                let matchKelas = (filterKls === "SEMUA" || String(row.Kelas) === filterKls);
                
                return matchText && matchKelas;
            });

            // Urutkan dari nominal terbesar ke terkecil
            hasilSaring.sort((a,b) => {
                let sisaA = a.Status === 'Cicilan' ? (parseInt(a.Nominal) - parseInt(a.Terbayar||0)) : parseInt(a.Nominal);
                let sisaB = b.Status === 'Cicilan' ? (parseInt(b.Nominal) - parseInt(b.Terbayar||0)) : parseInt(b.Nominal);
                return sisaB - sisaA;
            });

            tabelBody.innerHTML = '';

            if(hasilSaring.length === 0) {
                tabelBody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="fa-solid fa-check-circle" style="font-size:50px; color:var(--c-green); margin-bottom:15px;"></i><br>Alhamdulillah, tidak ada catatan tunggakan sesuai kriteria ini.</div></td></tr>`;
                document.getElementById('totalPiutang').innerText = 'Rp 0';
                return;
            }

            hasilSaring.forEach(row => {
                let info = getInfoMutlak(row.ID_Murid);
                let sisa = row.Status === 'Cicilan' ? (parseInt(row.Nominal) - parseInt(row.Terbayar||0)) : parseInt(row.Nominal);
                totalTunggakan += sisa;

                let noWA = formatWA(info.wa);
                let pesanWA = encodeURIComponent(`Assalamu'alaikum Wr. Wb.\nMohon maaf mengganggu waktunya Bapak/Ibu Wali dari ananda *${info.nama}* (${row.Kelas}).\n\nKami menginformasikan adanya tagihan administrasi madrasah untuk:\n📌 *${row.Nama_Pos}*\n📝 ${row.Keterangan}\n\nSisa Tunggakan: *${formatRp(sisa)}*\n\nMohon konfirmasinya apabila sudah berkenan untuk menyelesaikan administrasi tersebut. Terima kasih.\n\n_Pesan otomatis dari Sistem Keuangan MMU B-77_`);
                
                let linkWA = noWA ? `https://wa.me/${noWA}?text=${pesanWA}` : '#';
                let btnWAHTML = noWA ? `<a href="${linkWA}" target="_blank" class="btn-wa"><i class="fa-brands fa-whatsapp" style="font-size:16px;"></i> Tagih</a>` : `<span style="font-size:10px; color:var(--text-muted); font-weight:700;"><i class="fa-solid fa-phone-slash"></i> WA Kosong</span>`;

                let badge = row.Status === 'Cicilan' ? `<span class="badge-cicilan">Cicilan</span>` : `<span class="badge-tunggakan">Belum Lunas</span>`;

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--text-muted); font-size:11px;">${row.Tanggal_Buat ? row.Tanggal_Buat.split(' ')[0] : '-'}</td>
                    <td><strong style="color:var(--text-dark); font-family:'Montserrat'; font-size:13px;">${row.ID_Murid}</strong><br><span style="color:var(--text-muted); font-size:11px; font-weight:700;">${info.nama}</span></td>
                    <td style="font-weight:700; color:var(--c-blue);">${row.Kelas || '-'}</td>
                    <td><strong style="color:var(--text-dark);">${row.Nama_Pos}</strong><br><span style="font-size:10px; color:var(--text-muted); font-weight:600;">${row.Keterangan}</span></td>
                    <td class="text-right text-bold">${formatRp(sisa)}</td>
                    <td>${badge}</td>
                    <td class="kolom-aksi" style="text-align:center;">${btnWAHTML}</td>
                `;
                tabelBody.appendChild(tr);
            });

            document.getElementById('totalPiutang').innerText = formatRp(totalTunggakan);
            document.getElementById('teksRingkasan').innerText = filterKls === "SEMUA" ? "Total Piutang Berjalan (Aktif)" : `Total Piutang Berjalan - Kelas ${filterKls}`;
            document.getElementById('judulLaporanPdf').innerText = filterKls === "SEMUA" ? "Laporan Rekapitulasi Tunggakan Santri" : `Laporan Tunggakan Santri - Kelas ${filterKls}`;
        }

        function exportExcel() {
            showToast("Mempersiapkan file Excel...");
            let table = document.getElementById("tabelTagihan");
            
            let tempTable = table.cloneNode(true);
            tempTable.querySelectorAll('.kolom-aksi').forEach(el => el.remove());

            let wb = XLSX.utils.table_to_book(tempTable, {sheet: "Tunggakan"});
            let ws = wb.Sheets["Tunggakan"];
            if(ws) { ws['!cols'] = [{wch: 15}, {wch: 35}, {wch: 15}, {wch: 30}, {wch: 20}, {wch: 15}]; }
            
            let tgl = new Date().toISOString().split('T')[0];
            let kls = document.getElementById("filterKelas").value;
            let namaFile = kls === "SEMUA" ? `Daftar_Tunggakan_${tgl}.xlsx` : `Daftar_Tunggakan_Kelas_${kls}_${tgl}.xlsx`;
            
            XLSX.writeFile(wb, namaFile);
        }
    </script>
</body>
</html>
