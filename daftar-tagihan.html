<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f0f4f8" id="meta-theme-color">
    <title>Daftar Tagihan - Sistem Keuangan</title>
    
    <link rel="icon" type="image/png" href="Logo Favicon.png">
    <link rel="apple-touch-icon" href="Logo Favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>

    <style>
        /* --- TEMA SOFT UI --- */
        :root {
            --bg-main: #f0f4f8; 
            --text-dark: #2d3748;
            --text-muted: #718096;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --green-grad: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            --red-grad: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            --blue-grad: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        }
        [data-theme="dark"] {
            --bg-main: #2d3748; --text-dark: #f0f4f8; --text-muted: #a0aec0;
            --shadow-light: #3a4556; --shadow-dark: #202835;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { margin: 0; padding: 0; background-color: var(--bg-main); font-family: 'Poppins', sans-serif; color: var(--text-dark); user-select: none; padding-bottom: 50px; transition: 0.3s; }
        
        .app-container { max-width: 1000px; margin: 0 auto; min-height: 100vh; padding: 20px; }

        /* --- TOAST NOTIFICATION --- */
        #toast { visibility: hidden; min-width: 250px; background-color: #1e293b; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; font-size: 12px; transform: translateX(-50%); font-family: 'Poppins', sans-serif; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; gap: 10px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s forwards; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* --- NAVIGASI HEADER --- */
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .btn-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--bg-main); display: flex; justify-content: center; align-items: center; color: var(--text-dark); text-decoration: none; box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light); transition: 0.2s; cursor: pointer; border: none; font-size: 16px; }
        .btn-icon:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .header-title { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; margin: 0; color: var(--text-dark); }

        /* --- PANEL FILTER & PENCARIAN --- */
        .panel-card { background: var(--bg-main); border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 6px 6px 15px var(--shadow-dark), -6px -6px 15px var(--shadow-light); display: flex; gap: 15px; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        
        .filter-group { display: flex; gap: 10px; flex: 1; min-width: 300px; }
        .search-wrapper { display: flex; flex: 2; position: relative; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-edit { width: 100%; padding: 12px 15px 12px 40px; border: none; border-radius: 12px; background: var(--bg-main); font-family: 'Poppins', sans-serif; font-size: 12px; color: var(--text-dark); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); outline: none; box-sizing: border-box; user-select: auto; appearance: none; transition: 0.3s; }
        .input-edit:focus { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 2px rgba(239, 68, 68, 0.3); }
        
        .select-edit { padding: 12px 15px; padding-left: 15px; flex: 1; cursor: pointer; }

        .btn-action { padding: 12px 20px; border: none; border-radius: 12px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; color: white; white-space: nowrap; }
        .btn-excel { background: var(--green-grad); box-shadow: 4px 4px 10px rgba(34, 197, 94, 0.3); }
        .btn-pdf { background: var(--red-grad); box-shadow: 4px 4px 10px rgba(239, 68, 68, 0.3); }
        .btn-action:active { transform: translateY(2px); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }

        /* --- AREA CETAK (PRINT AREA) --- */
        #print-area { background: var(--bg-main); border-radius: 20px; transition: all 0.3s; padding-bottom: 10px;}
        .report-header { text-align: center; margin-bottom: 20px; display: none; }
        .report-header h2 { margin: 0 0 5px 0; font-family: 'Montserrat', sans-serif; font-size: 16px; color: #ef4444; }
        .report-header p { margin: 0; font-size: 10px; color: var(--text-muted); }

        /* SUMMARY CARD */
        .summary-card { background: var(--bg-main); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 6px 6px 15px var(--shadow-dark), -6px -6px 15px var(--shadow-light); border: 2px solid transparent; }
        .summary-info p { margin: 0 0 5px 0; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-info h3 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; color: #ef4444; }
        .summary-icon { width: 50px; height: 50px; border-radius: 15px; background: var(--bg-main); color: #ef4444; font-size: 20px; display: flex; justify-content: center; align-items: center; box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light); }

        /* TABEL DATA */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; font-size: 11px; text-align: left; }
        th { color: var(--text-muted); font-weight: 700; padding: 15px 12px; border-bottom: 2px solid rgba(209, 217, 230, 0.5); font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(209, 217, 230, 0.5); color: var(--text-dark); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        
        .text-right { text-align: right; }
        .text-bold { font-weight: 700; font-family: 'Montserrat', sans-serif; font-size: 12px; color: #ef4444; }
        
        .badge-tunggakan { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 4px 10px; border-radius: 8px; font-weight: 600; }
        .btn-wa { background: var(--green-grad); color: white; padding: 6px 12px; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; box-shadow: 2px 2px 8px rgba(34, 197, 94, 0.3); transition: 0.2s; }
        .btn-wa:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); transform: translateY(1px); }

        .empty-state { text-align: center; padding: 40px 20px; color: #a0aec0; font-weight: 500; font-size: 12px; }
        .neumorphic-spinner { width: 30px; height: 30px; border-radius: 50%; background: var(--bg-main); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); border: 3px solid transparent; border-top-color: #22c55e; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* KELAS KHUSUS SAAT CETAK PDF */
        .print-mode { background: #ffffff !important; padding: 20px !important; }
        .print-mode .summary-card { box-shadow: none !important; border: 1px solid #d1d9e6 !important; background: #f8fafc !important; }
        .print-mode .summary-icon { box-shadow: none !important; border: 1px solid #d1d9e6 !important; background: #ffffff !important; }
        .print-mode table { font-size: 9px !important; }
        .print-mode th { color: #000 !important; border-bottom: 2px solid #000 !important; }
        .print-mode td { border-bottom: 1px solid #ccc !important; }

        @media print {
            body { background: white; color: black; padding: 0; }
            .nav-top, .panel-card, .btn-icon { display: none !important; }
            .summary-card { box-shadow: none !important; border: 1px solid black !important; border-radius: 0; padding: 10px; margin-bottom: 15px; }
            .summary-icon { display: none !important; }
            .table-wrapper { box-shadow: none !important; padding: 0 !important; border-radius: 0; }
            table { width: 100%; border-collapse: collapse; font-size: 10px !important; }
            table, th, td { border: 1px solid black !important; }
            th { background-color: #f2f2f2 !important; color: black !important; -webkit-print-color-adjust: exact; }
            .kolom-aksi { display: none !important; }
            .badge-tunggakan { background: transparent !important; color: black !important; padding: 0; }
            .report-header { display: block !important; }
        }
    </style>
</head>
<body>

    <div id="toast"><i class="fa-solid fa-circle-info"></i> <span id="toastMsg">Pesan Notifikasi</span></div>

    <div class="app-container">
        
        <div class="nav-top">
            <button class="btn-icon" onclick="window.location.href='beranda.html'"><i class="fa-solid fa-angle-left"></i></button>
            <h1 class="header-title">Riwayat Tunggakan</h1>
            <div style="width: 40px;"></div>
        </div>

        <div class="panel-card">
            <div class="filter-group">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" class="input-edit" id="searchInput" placeholder="Cari nama santri atau kelas..." onkeyup="terapkanFilter()">
                </div>
                <select class="input-edit select-edit" id="filterKelas" onchange="terapkanFilter()">
                    <option value="SEMUA">Semua Kelas</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-action btn-excel" onclick="exportExcel()"><i class="fa-solid fa-file-excel"></i> Excel</button>
                <button class="btn-action btn-pdf" onclick="downloadPDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            </div>
        </div>

        <div id="print-area">
            
            <div class="report-header" id="pdfHeader">
                <h2 id="judulLaporanPdf">Laporan Rekapitulasi Tunggakan Santri</h2>
                <p>Madrasah Miftahul Ulum Ibtidaiyah B-77 Jrebeng Kulon</p>
                <p style="margin-top: 5px; font-weight: 700;" id="tglCetak">Dicetak pada: -</p>
            </div>

            <div class="summary-card">
                <div class="summary-info">
                    <p id="teksRingkasan">Total Piutang Berjalan (Belum Lunas)</p>
                    <h3 id="totalPiutang">Rp 0</h3>
                </div>
                <div class="summary-icon">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="tabelTagihan">
                    <thead>
                        <tr>
                            <th>Tgl Dibuat</th>
                            <th>ID / Nama Santri</th>
                            <th>Kelas</th>
                            <th>Jenis Tagihan</th>
                            <th class="text-right">Nominal</th>
                            <th>Status</th>
                            <th class="kolom-aksi">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-body">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <div class="neumorphic-spinner"></div>
                                    Mencari data tunggakan...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzYAJEid9Z9XVxeP_YEF9P8m6EozFh1vrE-V2GPgukGLXSD71QVgN0MSJCKNBcbu3577Q/exec'; 
        let dataTunggakan = []; 

        // AUTO LOGOUT
        let idleTime = 0;
        document.addEventListener('mousemove', () => idleTime = 0);
        document.addEventListener('keypress', () => idleTime = 0);
        document.addEventListener('touchstart', () => idleTime = 0);
        
        setInterval(() => {
            idleTime++;
            if(idleTime > 10) { 
                localStorage.removeItem('usernameAsli');
                alert("Sesi Anda telah berakhir karena tidak ada aktivitas. Silakan login kembali demi keamanan.");
                window.location.href = 'index.html';
            }
        }, 60000);

        // TOAST NOTIFICATION
        function showToast(msg) {
            let toast = document.getElementById("toast");
            document.getElementById("toastMsg").innerText = msg;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function formatRupiah(angka) {
            return 'Rp ' + parseInt(angka || 0).toLocaleString('id-ID');
        }

        function muatData() {
            fetch(scriptURL + "?sheet_name=DataTagihan")
            .then(res => res.json())
            .then(res => {
                if(res.data && res.data.length > 0) {
                    dataTunggakan = res.data.filter(row => row.Status && row.Status.toLowerCase() === 'belum lunas');
                }

                // Siapkan Dropdown Filter Kelas secara dinamis
                let setKelas = new Set();
                dataTunggakan.forEach(row => {
                    if(row.Kelas) setKelas.add(row.Kelas);
                });
                
                let optKelas = '<option value="SEMUA">Semua Kelas</option>';
                Array.from(setKelas).sort().forEach(k => {
                    optKelas += `<option value="${k}">Kelas ${k}</option>`;
                });
                document.getElementById('filterKelas').innerHTML = optKelas;

                // Terapkan Filter & Render Awal
                terapkanFilter();
                showToast("Data Tagihan berhasil dimuat.");
            })
            .catch(error => { 
                document.getElementById('tabel-body').innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="fa-solid fa-triangle-exclamation" style="color:#ef4444; font-size:30px; margin-bottom:10px;"></i><br>Gagal memuat data. Periksa koneksi internet.</div></td></tr>`; 
            });
        }

        // FUNGSI FILTER GABUNGAN (Pencarian Text + Dropdown Kelas)
        function terapkanFilter() {
            let inputCari = document.getElementById("searchInput").value.toLowerCase();
            let filterKls = document.getElementById("filterKelas").value;
            let tabelBody = document.getElementById('tabel-body');
            
            let totalTunggakan = 0;

            let hasilSaring = dataTunggakan.filter(row => {
                let idMurid = row.ID_Murid ? String(row.ID_Murid).toLowerCase() : "";
                let namaSnt = row.Nama_Santri ? String(row.Nama_Santri).toLowerCase() : "";
                let klsSnt = row.Kelas ? String(row.Kelas) : "";
                
                let matchText = idMurid.includes(inputCari) || namaSnt.includes(inputCari) || klsSnt.toLowerCase().includes(inputCari);
                let matchKelas = (filterKls === "SEMUA" || klsSnt === filterKls);
                
                return matchText && matchKelas;
            });

            tabelBody.innerHTML = '';

            if(hasilSaring.length === 0) {
                tabelBody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="fa-solid fa-circle-check" style="font-size:35px; color:#22c55e; margin-bottom:15px;"></i><br>Alhamdulillah, tidak ada catatan tunggakan sesuai kriteria ini.</div></td></tr>`;
                document.getElementById('totalPiutang').innerText = 'Rp 0';
                
                let teksRingkas = filterKls === "SEMUA" ? "Total Piutang Berjalan" : "Total Piutang Kelas " + filterKls;
                document.getElementById('teksRingkasan').innerText = teksRingkas;
                return;
            }

            hasilSaring.forEach(row => {
                let nominal = parseInt(row.Nominal) || 0;
                totalTunggakan += nominal;

                let pesanWA = encodeURIComponent(`Assalamu'alaikum Wr. Wb. Bapak/Ibu Wali dari *${row.Nama_Santri}* (${row.Kelas}). Kami menginformasikan adanya tagihan administrasi madrasah untuk *${row.Keterangan}* sebesar *${formatRupiah(nominal)}* yang belum terselesaikan. Mohon konfirmasinya. Terima kasih.`);
                let linkWA = `https://wa.me/?text=${pesanWA}`; 

                let tr = document.createElement('tr');
                tr.className = "baris-data";
                tr.innerHTML = `
                    <td style="color:var(--text-muted);">${row.Tanggal_Buat ? row.Tanggal_Buat.split(' ')[0] : '-'}</td>
                    <td><strong style="color:var(--text-dark);">${row.ID_Murid}</strong><br><span style="color:var(--text-muted); font-size:10px;">${row.Nama_Santri}</span></td>
                    <td>${row.Kelas || '-'}</td>
                    <td>${row.Nama_Pos}<br><span style="font-size:9px; color:var(--text-muted);">${row.Keterangan}</span></td>
                    <td class="text-right text-bold">${formatRupiah(nominal)}</td>
                    <td><span class="badge-tunggakan">Belum Lunas</span></td>
                    <td class="kolom-aksi">
                        <a href="${linkWA}" target="_blank" class="btn-wa" title="Kirim Pengingat WA"><i class="fa-brands fa-whatsapp"></i> Tagih</a>
                    </td>
                `;
                tabelBody.appendChild(tr);
            });

            document.getElementById('totalPiutang').innerText = formatRupiah(totalTunggakan);
            
            // Perbarui Judul PDF dan Teks Ringkasan sesuai kelas yang dipilih
            let teksRingkas = filterKls === "SEMUA" ? "Total Piutang Berjalan (Belum Lunas)" : "Total Piutang Kelas " + filterKls;
            document.getElementById('teksRingkasan').innerText = teksRingkas;
            
            let judulPdf = filterKls === "SEMUA" ? "Laporan Rekapitulasi Tunggakan Santri" : "Laporan Tunggakan Santri - Kelas " + filterKls;
            document.getElementById('judulLaporanPdf').innerText = judulPdf;
        }

        // EKSPOR EXCEL
        function exportExcel() {
            showToast("Mempersiapkan file Excel...");
            let table = document.getElementById("tabelTagihan");
            
            // Clone tabel dan sembunyikan kolom aksi agar tidak ikut ter-export
            let tempTable = table.cloneNode(true);
            let actionHeaders = tempTable.querySelectorAll('.kolom-aksi');
            actionHeaders.forEach(th => th.remove());
            let actionCells = tempTable.querySelectorAll('td.kolom-aksi');
            actionCells.forEach(td => td.remove());

            let wb = XLSX.utils.table_to_book(tempTable, {sheet: "Tunggakan"});
            let ws = wb.Sheets["Tunggakan"];
            if(ws) { ws['!cols'] = [{wch: 15}, {wch: 35}, {wch: 15}, {wch: 30}, {wch: 20}, {wch: 15}]; }
            
            let tgl = new Date().toISOString().split('T')[0];
            let kls = document.getElementById("filterKelas").value;
            let namaFile = kls === "SEMUA" ? `Daftar_Tunggakan_${tgl}.xlsx` : `Daftar_Tunggakan_Kelas_${kls}_${tgl}.xlsx`;
            
            XLSX.writeFile(wb, namaFile);
            setTimeout(() => showToast("File Excel berhasil diunduh!"), 1500);
        }

        function downloadPDF() {
            showToast("Memproses PDF...");
            let headerPdf = document.getElementById('pdfHeader');
            let printArea = document.getElementById('print-area');
            
            let now = new Date();
            document.getElementById('tglCetak').innerText = "Dicetak pada: " + now.toLocaleDateString('id-ID') + " " + now.toLocaleTimeString('id-ID');

            headerPdf.style.display = 'block';
            printArea.classList.add('print-mode');
            
            let kolomAksi = document.querySelectorAll('.kolom-aksi');
            kolomAksi.forEach(el => el.style.display = 'none');

            let kls = document.getElementById("filterKelas").value;
            let namaFile = kls === "SEMUA" ? 'Laporan_Tunggakan_Semua.pdf' : `Laporan_Tunggakan_Kelas_${kls}.pdf`;

            var opt = {
                margin:       0.5,
                filename:     namaFile,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(printArea).save().then(() => {
                headerPdf.style.display = 'none';
                printArea.classList.remove('print-mode');
                kolomAksi.forEach(el => el.style.display = ''); 
                showToast("PDF Berhasil Diunduh!");
            });
        }

        window.onload = muatData;
    </script>
</body>
</html>
