        const firebaseConfig = {

    <style>
        /* --- TEMA NEUMORPHISM ASLI --- */
        :root {
            --bg-main: #e0e5ec;
            --text-dark: #31344b;
            --text-muted: #8C96A3;
            --shadow-dark: rgba(163, 177, 198, 0.6);
            --shadow-light: rgba(255, 255, 255, 0.6);
            --green-grad: linear-gradient(135deg, #37f08c 0%, #06d16f 100%);
            --orange-grad: linear-gradient(135deg, #fbbd23 0%, #f59e0b 100%);
            --border-line: #d1d9e6;
        }
        [data-theme="dark"] {
            --bg-main: #2d3748; --text-dark: #f0f4f8; --text-muted: #a0aec0;
            --shadow-dark: #202835; --shadow-light: #3a4556;
            --green-grad: linear-gradient(135deg, #009245 0%, #007A39 100%);
            --orange-grad: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            --border-line: #4a5568;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-main);
            font-family: 'Poppins', sans-serif; color: var(--text-dark);
            user-select: none; padding-bottom: 50px; transition: 0.3s;
        }
        
        .app-container { max-width: 1000px; margin: 0 auto; min-height: 100vh; padding: 25px 20px; animation: fadeIn 0.4s ease-out forwards;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TOAST NOTIFIKASI */
        #toast { visibility: hidden; min-width: 250px; background-color: #1e293b; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; font-size: 12px; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; }
        #toast.show { visibility: visible; animation: fadeinToast 0.5s, fadeoutToast 0.5s 2.5s forwards; }
        @keyframes fadeinToast { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeoutToast { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* --- NAVIGASI HEADER --- */
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .btn-icon {
            width: 45px; height: 45px; border-radius: 15px; background: var(--bg-main);
            display: flex; justify-content: center; align-items: center; color: var(--text-dark); text-decoration: none;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            transition: 0.3s; cursor: pointer; border: none; font-size: 16px;
        }
        .btn-icon:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .header-title { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; margin: 0; color: var(--text-dark); }

        /* --- CONTROL PANEL (PANEL KENDALI) --- */
        .control-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 25px; }
        @media (min-width: 768px) { .control-grid { grid-template-columns: 1fr 1.5fr; } }

        .panel-card {
            background: var(--bg-main); border-radius: 20px; padding: 20px;
            box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
        }
        
        .panel-title { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800; color: #22c55e; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .panel-title.orange { color: #f59e0b; }

        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; margin-left: 5px; }
        .input-edit {
            width: 100%; padding: 15px 20px; border: none; border-radius: 15px;
            background: var(--bg-main); font-family: 'Poppins', sans-serif; font-size: 13px; color: var(--text-dark);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            outline: none; box-sizing: border-box; user-select: auto; appearance: none; transition: 0.3s;
        }
        .input-edit:focus { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 2px rgba(34, 197, 94, 0.3); }
        
        .select-wrapper { position: relative; }
        .icon-select { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--green-text); pointer-events: none; }

        .btn-action {
            width: 100%; padding: 16px; border: none; border-radius: 15px; 
            font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.3s; 
            display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px;
        }
        .btn-cari { background: var(--green-grad); color: white; box-shadow: 4px 4px 10px rgba(34, 197, 94, 0.3); }
        .btn-mutasi { background: var(--orange-grad); color: white; box-shadow: 4px 4px 10px rgba(245, 158, 11, 0.3); }
        
        .btn-action:active { transform: translateY(2px); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }
        .btn-action:disabled { background: var(--border-line); box-shadow: none; cursor: not-allowed; color: var(--text-muted); transform: none; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* --- TABEL DATA --- */
        .table-wrapper {
            background: var(--bg-main); border-radius: 20px; padding: 15px;
            box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            overflow-x: auto; max-height: 60vh;
        }
        .table-wrapper::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        table { width: 100%; border-collapse: collapse; white-space: nowrap; font-size: 12px; text-align: left; }
        
        /* STICKY HEADER */
        th { 
            position: sticky; top: 0; background-color: var(--bg-main); z-index: 10;
            color: var(--text-muted); font-weight: 700; padding: 15px 12px; 
            font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; 
        }
        th::after { content: ''; position: absolute; left: 0; bottom: 0; width: 100%; border-bottom: 2px solid var(--border-line); }

        td { padding: 15px 12px; border-bottom: 1px solid var(--border-line); color: var(--text-dark); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        
        /* Smart Row Click Hover Effect */
        .baris-data { cursor: pointer; transition: 0.2s; }
        .baris-data:hover { background-color: rgba(34, 197, 94, 0.05); }
        .baris-data.terpilih { background-color: rgba(245, 158, 11, 0.1); }

        /* Soft Checkbox Kustom Neumorphism */
        .cb-container { display: block; position: relative; cursor: pointer; font-size: 22px; user-select: none; padding-left: 28px; margin-bottom: 0; pointer-events: none; }
        .cb-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { 
            position: absolute; top: -10px; left: 0; height: 22px; width: 22px; 
            background-color: var(--bg-main); border-radius: 8px; 
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); 
            transition: 0.2s;
        }
        .cb-container input:checked ~ .checkmark { background: var(--orange-grad); box-shadow: none; }
        .checkmark:after { content: ""; position: absolute; display: none; }
        .cb-container input:checked ~ .checkmark:after { display: block; left: 8px; top: 4px; width: 4px; height: 10px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-weight: 500; }
        .empty-state i { font-size: 40px; margin-bottom: 15px; display: block; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="toast"><i class="fa-solid fa-circle-info"></i> <span id="toastMsg">Pesan</span></div>

    <div class="app-container">
        
        <div class="nav-top">
            <button class="btn-icon" onclick="window.location.href='data-santri.html'"><i class="fa-solid fa-angle-left"></i></button>
            <h1 class="header-title">Mutasi Kelas</h1>
            <div style="width: 45px;"></div>
        </div>

        <div class="control-grid">
            <div class="panel-card">
                <h3 class="panel-title"><i class="fa-solid fa-filter"></i> Filter Kelas Asal</h3>
                <div class="input-group">
                    <label>Pilih Kelas Saat Ini <span id="infoJumlahKelas" style="color:var(--green-text);"></span></label>
                    <div class="select-wrapper">
                        <select class="input-edit" id="kelasAsal" style="cursor: pointer;">
                            <option value="">Memuat daftar kelas...</option>
                        </select>
                        <i class="fa-solid fa-chevron-down icon-select"></i>
                    </div>
                </div>
                <button class="btn-action btn-cari" onclick="tarikDataBerdasarkanKelas()" id="btnCari">
                    <i class="fa-solid fa-magnifying-glass"></i> Tampilkan Santri
                </button>
            </div>

            <div class="panel-card">
                <h3 class="panel-title orange"><i class="fa-solid fa-right-left"></i> Eksekusi Mutasi</h3>
                <div class="grid-2">
                    <div class="input-group">
                        <label>Aksi Mutasi</label>
                        <div class="select-wrapper">
                            <select class="input-edit" id="jenisAksi" style="cursor: pointer;" onchange="cekTampilanKelasTujuan()">
                                <option value="Naik Kelas">Naik / Pindah Kelas</option>
                                <option value="Lulus">Lulus / Alumni</option>
                                <option value="Nonaktif">Berhenti / Nonaktif</option>
                            </select>
                            <i class="fa-solid fa-chevron-down icon-select"></i>
                        </div>
                    </div>
                    <div class="input-group" id="grupKelasTujuan">
                        <label>Kelas Tujuan (Baru)</label>
                        <div class="select-wrapper">
                            <select class="input-edit" id="kelasTujuanDropdown" style="cursor: pointer;" onchange="cekKelasBaru()">
                                <option value="">-- Pilih Kelas Tujuan --</option>
                            </select>
                            <i class="fa-solid fa-chevron-down icon-select"></i>
                        </div>
                        <input type="text" class="input-edit" id="kelasTujuanManual" placeholder="Ketik nama kelas baru..." style="display: none; margin-top: 10px;">
                    </div>
                </div>
                <button class="btn-action btn-mutasi" onclick="prosesMutasi()" id="btnProses">
                    <i class="fa-solid fa-bolt"></i> Proses Mutasi Terpilih
                </button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px; padding-left: 15px;">
                            <label class="cb-container" style="pointer-events: auto;">
                                <input type="checkbox" id="checkAll" onclick="toggleAll(this)">
                                <span class="checkmark"></span>
                            </label>
                        </th>
                        <th>ID Murid</th>
                        <th>Nama Lengkap</th>
                        <th>L/P</th>
                        <th>Kelas Saat Ini</th>
                        <th>Keterangan</th>
                    </tr>
                </thead>
                <tbody id="tabel-body">
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <i class="fa-solid fa-circle-notch fa-spin" style="color: #22c55e; font-size: 30px;"></i>
                                <p>Menarik data dari server Firebase...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function showToast(msg) {
            let toast = document.getElementById("toast"); document.getElementById("toastMsg").innerText = msg;
            toast.className = "show"; setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        let semuaDataSantri = []; 
        let targetAutoSelectNIS = null;

        // 0. JALANKAN OTOMATIS SAAT HALAMAN DIBUKA
        window.onload = function() {
            // Cek URL apakah ada titipan NIS dari halaman Data Santri (Auto-Select Feature)
            const urlParams = new URLSearchParams(window.location.search);
            targetAutoSelectNIS = urlParams.get('nis');

            muatDaftarKelasDanData();
        };

        // 1. FUNGSI UNTUK MENGAMBIL DAFTAR KELAS & MENAMPILKAN SEMUA DATA VIA FIREBASE
        function muatDaftarKelasDanData() {
            database.ref('santri').on('value', snapshot => {
                semuaDataSantri = [];
                let setKelas = new Set();
                
                if(snapshot.exists()) {
                    snapshot.forEach(child => {
                        let row = child.val();
                        if(typeof row === 'object' && row !== null) {
                            // Abaikan yang sudah nonaktif/lulus agar tidak menuhi tabel mutasi, kecuali sedang dicari khusus
                            let status = String(row.Status || row.Kelas || '').toLowerCase();
                            semuaDataSantri.push(row);
                            if(row.Kelas && String(row.Kelas).trim() !== '' && status !== 'lulus' && status !== 'nonaktif') {
                                setKelas.add(String(row.Kelas).trim());
                            }
                        }
                    });
                }
                
                let selectAsal = document.getElementById('kelasAsal');
                let selectTujuan = document.getElementById('kelasTujuanDropdown');
                
                let valAsalLama = selectAsal.value;

                selectAsal.innerHTML = '<option value="">-- Semua Kelas --</option>';
                selectTujuan.innerHTML = '<option value="">-- Pilih Kelas Tujuan --</option><option value="BARU" style="font-weight: 700; color: #f59e0b;">+ BUAT KELAS BARU</option>';
                
                Array.from(setKelas).sort().forEach(kls => {
                    selectAsal.appendChild(new Option(kls, kls));
                    selectTujuan.appendChild(new Option(kls, kls));
                });
                
                if(valAsalLama) selectAsal.value = valAsalLama;

                // Eksekusi Auto-Select jika ada titipan NIS
                if(targetAutoSelectNIS) {
                    let targetSantri = semuaDataSantri.find(s => String(s.ID_Murid) === targetAutoSelectNIS);
                    if(targetSantri) {
                        selectAsal.value = targetSantri.Kelas; // Auto set dropdown filter
                        tarikDataBerdasarkanKelas(); // Tampilkan & centang
                        targetAutoSelectNIS = null; // Reset agar tidak loop
                        return;
                    }
                }

                tarikDataBerdasarkanKelas(); 
            }, error => {
                document.getElementById('tabel-body').innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fa-solid fa-triangle-exclamation" style="color: #ef4444; font-size: 30px;"></i><p>Akses ditolak atau terputus dari Firebase.</p></div></td></tr>';
            });
        }

        // FUNGSI RENDER TABEL (DIPISAH AGAR RAPI)
        function renderTabel(dataArray) {
            let tabelBody = document.getElementById('tabel-body');
            tabelBody.innerHTML = '';

            if(dataArray.length === 0) {
                tabelBody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fa-regular fa-folder-open" style="font-size: 30px;"></i><p>Tidak ada data santri ditemukan.</p></div></td></tr>`;
                document.getElementById('infoJumlahKelas').innerText = `(0 Anak)`;
                return;
            }
            
            document.getElementById('infoJumlahKelas').innerText = `(${dataArray.length} Anak)`;

            dataArray.forEach(row => {
                let isAutoChecked = (targetAutoSelectNIS && String(row.ID_Murid) === targetAutoSelectNIS) ? 'checked' : '';
                let bgRowClass = isAutoChecked ? 'terpilih' : '';

                let tr = document.createElement('tr');
                tr.className = `baris-data ${bgRowClass}`;
                tr.id = `row_${row.ID_Murid}`;
                // Smart Row Click: Baris diklik -> Checkbox berubah
                tr.onclick = function() { toggleRowClick(row.ID_Murid); };
                
                tr.innerHTML = `
                    <td style="padding-left: 15px;">
                        <label class="cb-container">
                            <input type="checkbox" class="check-item" id="cb_${row.ID_Murid}" value="${row.ID_Murid}" ${isAutoChecked}>
                            <span class="checkmark"></span>
                        </label>
                    </td>
                    <td><strong>${row.ID_Murid}</strong></td>
                    <td style="font-weight: 600;">${row.Nama_Lengkap}</td>
                    <td>${row.LP}</td>
                    <td><span style="background: rgba(34, 197, 94, 0.15); color: var(--green-text); padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 10px;">${row.Kelas}</span></td>
                    <td>${row.Keterangan || '-'}</td>
                `;
                tabelBody.appendChild(tr);
            });
            
            document.getElementById('checkAll').checked = false;
            updateCounter(); // Perbarui tulisan di tombol Proses
        }

        // --- FITUR ADVANCE: SMART ROW CLICK & COUNTER ---
        function toggleRowClick(id) {
            let cb = document.getElementById(`cb_${id}`);
            let row = document.getElementById(`row_${id}`);
            cb.checked = !cb.checked;
            
            if(cb.checked) row.classList.add('terpilih');
            else row.classList.remove('terpilih');
            
            updateCounter();
        }

        function updateCounter() {
            let checkedBoxes = document.querySelectorAll('.check-item:checked');
            let btnProses = document.getElementById('btnProses');
            if(checkedBoxes.length > 0) {
                btnProses.innerHTML = `<i class="fa-solid fa-bolt"></i> Proses Mutasi (${checkedBoxes.length} Terpilih)`;
            } else {
                btnProses.innerHTML = `<i class="fa-solid fa-bolt"></i> Proses Mutasi Terpilih`;
            }
        }

        function toggleAll(source) {
            let checkboxes = document.querySelectorAll('.check-item');
            checkboxes.forEach(cb => {
                cb.checked = source.checked;
                let row = document.getElementById(`row_${cb.value}`);
                if(cb.checked) row.classList.add('terpilih');
                else row.classList.remove('terpilih');
            });
            updateCounter();
        }

        // 2. FUNGSI MENAMPILKAN / MENYEMBUNYIKAN KOLOM KELAS TUJUAN
        function cekTampilanKelasTujuan() {
            let aksi = document.getElementById('jenisAksi').value;
            let grupTujuan = document.getElementById('grupKelasTujuan');
            if(aksi === 'Naik Kelas') {
                grupTujuan.style.display = 'block';
            } else {
                grupTujuan.style.display = 'none';
            }
        }

        // 3. FUNGSI MUNCULKAN KOLOM KETIK JIKA PILIH "BUAT KELAS BARU"
        function cekKelasBaru() {
            let select = document.getElementById('kelasTujuanDropdown');
            let inputManual = document.getElementById('kelasTujuanManual');
            
            if(select.value === 'BARU') {
                inputManual.style.display = 'block';
                inputManual.focus();
            } else {
                inputManual.style.display = 'none';
            }
        }

        // 5. MENAMPILKAN DATA BERDASARKAN KELAS YANG DIPILIH
        function tarikDataBerdasarkanKelas() {
            let kelasDicari = document.getElementById('kelasAsal').value;
            let btnCari = document.getElementById('btnCari');
            
            btnCari.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Menyaring...'; btnCari.disabled = true;
            
            setTimeout(() => {
                let hasilFilter = semuaDataSantri;
                if(kelasDicari !== "") {
                    // Filter berdasarkan kelas yang diplih, dan jangan sembunyikan anak itu meski status lulus (jika khusus dicari lewat url)
                    hasilFilter = semuaDataSantri.filter(row => row.Kelas && String(row.Kelas).trim() === kelasDicari);
                }
                
                renderTabel(hasilFilter);
                btnCari.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Tampilkan Santri'; btnCari.disabled = false;
            }, 300); // Simulasi delay agar UI terasa smooth
        }

        // 6. FITUR ADVANCE: BATCH UPDATE FIREBASE & BLACK BOX LOGGING
        async function prosesMutasi() {
            let jenisAksi = document.getElementById('jenisAksi').value;
            let kelasFinal = '';
            
            if(jenisAksi === 'Naik Kelas') {
                let pilihanDropdown = document.getElementById('kelasTujuanDropdown').value;
                if(!pilihanDropdown) { showToast("Pilih Kelas Tujuan (Baru) terlebih dahulu!"); return; }
                
                if(pilihanDropdown === 'BARU') {
                    kelasFinal = document.getElementById('kelasTujuanManual').value.trim();
                    if(!kelasFinal) { showToast("Ketik nama kelas baru yang ingin dibuat!"); return; }
                } else {
                    kelasFinal = pilihanDropdown;
                }
            } else {
                kelasFinal = jenisAksi; // Untuk "Lulus" / "Nonaktif"
            }

            let checkedBoxes = document.querySelectorAll('.check-item:checked');
            let idTerpilih = Array.from(checkedBoxes).map(cb => cb.value);

            if(idTerpilih.length === 0) {
                showToast("Anda belum mencentang santri satupun!"); return;
            }

            if(!confirm(`PERINGATAN: Anda akan memindahkan ${idTerpilih.length} anak ke [${kelasFinal.toUpperCase()}]. Lanjutkan?`)) return;

            let btnProses = document.getElementById('btnProses');
            btnProses.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Menyuntik Database...'; btnProses.disabled = true;

            try {
                let updatesObject = {};
                
                // Siapkan Jejak Digital (Black Box)
                let logData = {
                    Waktu: new Date().toLocaleString('id-ID'),
                    Eksekutor: localStorage.getItem('namaPengguna') || 'Admin',
                    JenisMutasi: jenisAksi,
                    KelasTarget: kelasFinal,
                    JumlahAnak: idTerpilih.length,
                    DaftarNIS: idTerpilih.join(', ')
                };

                // Rakit Batch Update untuk Santri
                idTerpilih.forEach(id => {
                    if(jenisAksi === 'Nonaktif' || jenisAksi === 'Lulus') {
                        updatesObject[`santri/${id}/Status`] = kelasFinal; 
                        updatesObject[`santri/${id}/Kelas`] = kelasFinal; 
                    } else {
                        updatesObject[`santri/${id}/Kelas`] = kelasFinal;
                        updatesObject[`santri/${id}/Status`] = "Aktif"; 
                    }
                });

                // Eksekusi Massal ke Firebase
                await database.ref().update(updatesObject);
                
                // Simpan Jejak Digital
                await database.ref('log_mutasi').push(logData);

                showToast(`Sukses! ${idTerpilih.length} santri dipindahkan.`);
                
                // Reset form UI
                document.getElementById('kelasTujuanDropdown').value = '';
                document.getElementById('kelasTujuanManual').value = '';
                document.getElementById('kelasTujuanManual').style.display = 'none';
                
            } catch(e) {
                showToast("Gagal memproses mutasi. Periksa koneksi internet.");
                console.error(e);
            }
            
            btnProses.innerHTML = '<i class="fa-solid fa-bolt"></i> Proses Mutasi Terpilih'; btnProses.disabled = false;
        }
    </script>
</body>
</html>
