<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e0e5ec" id="meta-theme-color">
    <title>Command Center - MMU B-77</title>
    
    <link rel="icon" type="image/png" href="Logo-Favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        if (!localStorage.getItem('usernameAsli')) window.location.replace('index.html');
        if (localStorage.getItem('hakAkses') === 'Demo') {
            alert("🔒 AKSES DIBATASI: Akun Demo dilarang masuk ke Pusat Komunikasi.");
            window.location.replace('beranda.html');
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>

    <style>
        /* --- TEMA NEUMORPHISM STANDAR MMU B-77 --- */
        :root {
            --bg-main: #e0e5ec; --text-dark: #31344b; --text-muted: #8C96A3;
            --shadow-dark: rgba(163, 177, 198, 0.6); --shadow-light: rgba(255, 255, 255, 0.6);
            --c-green: #00d26a; --c-blue: #4facfe; --c-red: #ef4444; --c-orange: #f59e0b;
            --grad-blue: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --grad-green: linear-gradient(135deg, #2df077 0%, #00d26a 100%);
        }
        [data-theme="dark"] {
            --bg-main: #2d3748; --text-dark: #f0f4f8; --text-muted: #a0aec0;
            --shadow-dark: #202835; --shadow-light: #3a4556;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { margin: 0; padding: 0; background: var(--bg-main); font-family: 'Poppins', sans-serif; color: var(--text-dark); height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s;}
        
        .app-wrapper { width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; height: 100%; position: relative; background: var(--bg-main); box-shadow: 0 0 30px rgba(0,0,0,0.05);}

        /* TOAST */
        #toast { visibility: hidden; min-width: 250px; background-color: #31344b; color: #fff; text-align: center; border-radius: 12px; padding: 12px; position: fixed; z-index: 6000; left: 50%; bottom: 80px; font-size: 11px; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;}
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s forwards; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 80px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 80px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* HEADER */
        .nav-top { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--bg-main); z-index: 100; border-bottom: 2px dashed rgba(0,0,0,0.05); }
        .btn-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--bg-main); display: flex; justify-content: center; align-items: center; color: var(--text-dark); box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light); cursor: pointer; border: none; transition: 0.2s; font-size: 14px; flex-shrink: 0;}
        .btn-icon:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .header-title { font-family: 'Montserrat'; font-weight: 900; font-size: 14px; margin: 0; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dark); text-align: center; line-height: 1.2;}

        /* LAYOUT & SIDEBAR */
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; width: 100%;}
        
        .sidebar { position: absolute; top: 0; left: -100%; width: 260px; max-width: 80%; height: 100%; background: var(--bg-main); display: flex; flex-direction: column; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; overflow-y: auto; box-shadow: 15px 0 30px rgba(0,0,0,0.15);}
        .sidebar.show { left: 0; }
        
        .sidebar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 150; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(2px);}
        .sidebar-overlay.show { opacity: 1; visibility: visible; }

        .user-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; margin: 5px 12px; transition: 0.2s; cursor: pointer; box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light); background: var(--bg-main);}
        .user-avatar { width: 38px; height: 38px; border-radius: 10px; background: var(--grad-blue); display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; position: relative; font-family: 'Montserrat'; font-size: 14px; box-shadow: 3px 3px 8px rgba(79, 172, 254, 0.3); flex-shrink: 0;}
        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg-main); position: absolute; bottom: -2px; right: -2px; }
        .dot-online { background-color: var(--c-green); box-shadow: 0 0 6px var(--c-green); }
        .dot-offline { background-color: var(--text-muted); }

        .btn-pdf-export { margin: 15px; padding: 12px; border-radius: 12px; background: var(--bg-main); border: none; font-family: 'Poppins'; font-weight: 700; font-size: 11px; color: var(--c-blue); box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-pdf-export:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }

        /* AREA CHAT */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); position: relative; width: 100%;}
        
        .pinned-bar { background: var(--bg-main); padding: 10px 15px; border-bottom: 2px dashed rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; position: relative; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.02);}
        .pinned-bar i { color: var(--c-orange); font-size: 13px; flex-shrink: 0;}
        .pinned-text { font-size: 10px; font-weight: 700; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-family: 'Montserrat';}

        .chat-box { flex: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .bubble-wrapper { display: flex; flex-direction: column; max-width: 90%; transition: 0.3s; animation: fadeIn 0.3s ease-out;}
        .wrapper-in { align-self: flex-start; }
        .wrapper-out { align-self: flex-end; align-items: flex-end; }
        
        .chat-bubble { padding: 10px 12px; border-radius: 15px; font-size: 11px; line-height: 1.5; position: relative; box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light); word-wrap: break-word; font-weight: 500;}
        .bubble-in { background: var(--bg-main); color: var(--text-dark); border-top-left-radius: 4px; }
        .bubble-out { background: var(--grad-green); color: white; border-top-right-radius: 4px; box-shadow: 4px 4px 10px rgba(0, 210, 106, 0.3); cursor: pointer;}
        
        /* Thumbnail Gambar Chat Anti-Besar */
        .chat-img { max-width: 100%; max-height: 180px; width: auto; height: auto; object-fit: contain; border-radius: 8px; margin-bottom: 5px; box-shadow: 2px 2px 6px rgba(0,0,0,0.1); cursor: pointer; background: rgba(0,0,0,0.05);}
        
        .reply-context { background: rgba(0,0,0,0.1); padding: 5px 8px; border-radius: 8px; border-left: 3px solid var(--c-blue); margin-bottom: 5px; font-size: 9px; color: inherit; cursor: pointer; opacity: 0.8;}
        .mention-tag { color: var(--c-orange); font-weight: 900; background: rgba(245, 158, 11, 0.15); padding: 2px 4px; border-radius: 4px; font-family: 'Montserrat';}
        
        .reaction-badge { display: inline-flex; align-items: center; background: var(--bg-main); color: var(--text-dark); border-radius: 12px; padding: 2px 6px; font-size: 10px; margin-top: -10px; z-index: 2; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); float: right;}

        /* POPUP AKSI CHAT (BALAS/REAKSI/HAPUS) */
        .action-modal { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--bg-main); border-radius: 25px 25px 0 0; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); z-index: 4000; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; gap: 15px;}
        .action-modal.show { bottom: 0; }
        .emoji-row { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.03); border-radius: 15px; }
        .emoji-btn { font-size: 24px; background: none; border: none; cursor: pointer; transition: 0.2s; padding: 5px; border-radius: 50%;}
        .emoji-btn:active { transform: scale(1.3); background: rgba(0,0,0,0.05); }
        
        .action-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--bg-main); font-family: 'Poppins'; font-size: 12px; font-weight: 700; color: var(--text-dark); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); cursor: pointer; transition: 0.2s;}
        .action-btn:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .action-btn.del { color: var(--c-red); }

        /* INPUT AREA (RESPONSIF SEMUA HP) */
        .reply-preview { display: none; background: var(--bg-main); padding: 10px 15px; border-top: 2px dashed rgba(0,0,0,0.05); border-left: 4px solid var(--c-blue); position: relative; animation: slideUp 0.2s; }
        .input-area { padding: 12px 15px; background: var(--bg-main); display: flex; align-items: center; gap: 8px; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.03); border-top: 1px solid rgba(0,0,0,0.02);}
        
        .chat-input { flex: 1; padding: 12px 15px; border: none; border-radius: 15px; background: var(--bg-main); font-family: 'Poppins'; font-size: 11px; font-weight: 600; color: var(--text-dark); box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); outline: none; transition: 0.3s; min-width: 0;}
        
        .btn-send { background: var(--grad-blue); color: white; box-shadow: 3px 3px 8px rgba(79, 172, 254, 0.4); }

        /* PRINT PDF TERSEMBUNYI */
        #print-area { display: none; width: 800px; background: white; padding: 40px; color: black; position: absolute; left: 0; top: 0; z-index: -2000; font-family: Arial, sans-serif; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast"><i class="fa-solid fa-circle-info"></i> <span id="toastMsg">Pesan</span></div>
    <audio id="notifSound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

    <div class="app-wrapper">
        <div class="nav-top">
            <button class="btn-icon" onclick="vibrateClick(); window.location.href='beranda.html'"><i class="fa-solid fa-angle-left"></i></button>
            <h1 class="header-title">Command<br><span style="font-size:10px; color:var(--c-blue);">Center</span></h1>
            <button class="btn-icon" onclick="vibrateClick(); toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        </div>

        <div class="main-container">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

            <div class="sidebar" id="sidebar">
                <div style="padding: 20px; font-family:'Montserrat'; font-weight:900; font-size:11px; color:var(--text-dark); border-bottom: 2px dashed rgba(0,0,0,0.05); text-align: center; position: sticky; top: 0; background: var(--bg-main); z-index: 10;">
                    <i class="fa-solid fa-satellite-dish" style="color:var(--c-blue);"></i> RADAR AKTIVITAS
                </div>
                <div id="userListArea" style="padding-top: 10px;"></div>
                
                <div style="margin-top:auto; border-top: 2px dashed rgba(0,0,0,0.05); padding-top:10px;">
                    <button class="btn-pdf-export" onclick="eksporPDFChat()"><i class="fa-solid fa-file-pdf"></i> Unduh PDF Riwayat Chat</button>
                </div>
            </div>

            <div class="chat-area">
                <div class="pinned-bar" onclick="handlePinnedClick()">
                    <i class="fa-solid fa-thumbtack"></i>
                    <div class="pinned-text" id="pinnedText">Memuat pengumuman penting...</div>
                </div>

                <div class="chat-box" id="chatBox">
                    <div style="text-align:center; color:var(--c-green); font-size:9px; margin:5px 0; font-weight: 700; padding: 6px; background: rgba(0,0,0,0.03); border-radius: 10px;">
                        <i class="fa-solid fa-shield-halved"></i> Komunikasi Terenkripsi & Terhapus Otomatis (7 Hari)
                    </div>
                </div>

                <div class="reply-preview" id="replyPreview">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b id="replyTargetName" style="font-size:10px; color:var(--c-blue); font-family:'Montserrat';">Membalas Seseorang</b>
                        <i class="fa-solid fa-circle-xmark" style="cursor:pointer; font-size:14px; color:var(--text-muted);" onclick="vibrateClick(); cancelReply()"></i>
                    </div>
                    <p id="replyTargetText" style="font-size:9px; color:var(--text-muted); margin:4px 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight: 500;"></p>
                </div>

                <div class="input-area">
                    <button class="btn-icon" onclick="vibrateClick(); document.getElementById('fileInput').click()" title="Kirim Gambar Foto (Otomatis Kompres)"><i class="fa-solid fa-image"></i></button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="prosesGambar(event)">
                    
                    <input type="text" class="chat-input" id="chatInput" placeholder="Ketik atau panggil @Sistem..." onkeypress="if(event.key === 'Enter') kirimPesan()">
                    <button class="btn-icon btn-send" onclick="kirimPesan()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="actionOverlay" onclick="tutupActionModal()"></div>
    <div class="action-modal" id="actionModal">
        <div style="text-align:center; margin-bottom:5px;"><div style="width:40px; height:4px; background:var(--text-muted); border-radius:2px; display:inline-block; opacity:0.3;"></div></div>
        
        <div class="emoji-row" id="emojiRow">
            <button class="emoji-btn" onclick="kirimReaksi('👍')">👍</button>
            <button class="emoji-btn" onclick="kirimReaksi('❤️')">❤️</button>
            <button class="emoji-btn" onclick="kirimReaksi('😂')">😂</button>
            <button class="emoji-btn" onclick="kirimReaksi('🙏')">🙏</button>
            <button class="emoji-btn" onclick="kirimReaksi('✅')">✅</button>
        </div>
        
        <button class="action-btn" onclick="siapkanBalasan()"><i class="fa-solid fa-reply"></i> Balas Pesan</button>
        <button class="action-btn del" id="btnHapusPesan" onclick="hapusPesanSendiri()"><i class="fa-solid fa-trash-can"></i> Hapus Pesan (Tarik)</button>
    </div>

    <div id="print-area">
        <h2 style="text-align:center; margin-bottom:5px; font-family:Arial;">LOG AUDIT COMMAND CENTER</h2>
        <p style="text-align:center; font-size:12px; margin-bottom:20px; color:#555;">Dicetak: <span id="wktCetakPDF"></span></p>
        <table style="width:100%; border-collapse:collapse; font-size:12px; font-family:Arial;" id="pdfTable">
            <thead>
                <tr>
                    <th style="border:1px solid #000; padding:8px; background:#f0f0f0;">Waktu</th>
                    <th style="border:1px solid #000; padding:8px; background:#f0f0f0;">Pengirim</th>
                    <th style="border:1px solid #000; padding:8px; background:#f0f0f0;">Pesan</th>
                </tr>
            </thead>
            <tbody id="pdfBody"></tbody>
        </table>
    </div>

    <script>
        const myUid = localStorage.getItem('usernameAsli');
        const myName = localStorage.getItem('namaPengguna');
        const myRole = localStorage.getItem('hakAkses');
        
        let replyId = null;
        let currentBase64Img = "";
        let soundEl = document.getElementById('notifSound');
        let selectedMsgId = null; 
        let rawMessagesForPDF = [];

        function vibrateClick() { if (navigator.vibrate) navigator.vibrate(30); }
        function vibrateHeavy() { if (navigator.vibrate) navigator.vibrate(500); }
        
        function showToast(msg) { 
            let t = document.getElementById("toast"); document.getElementById("toastMsg").innerText = msg;
            t.className = "show"; setTimeout(() => t.className = t.className.replace("show", ""), 3000); 
        }

        let waktuLogout;
        function resetTimerLogout() {
            clearTimeout(waktuLogout);
            waktuLogout = setTimeout(() => {
                vibrateHeavy(); showToast("Sesi habis (15 Menit). Keluar demi keamanan...");
                setTimeout(() => { localStorage.removeItem('usernameAsli'); window.location.replace('index.html'); }, 2500);
            }, 15 * 60 * 1000); 
        }
        window.onload = resetTimerLogout; document.onmousemove = resetTimerLogout; document.onkeypress = resetTimerLogout; document.ontouchstart = resetTimerLogout;

        function toggleSidebar() { 
            vibrateClick();
            document.getElementById('sidebar').classList.toggle('show'); 
            document.getElementById('sidebarOverlay').classList.toggle('show'); 
        }

        // --- PRESENCE (STATUS ONLINE) ---
        database.ref('chat_presence/' + myUid).set({ name: myName, status: 'online', activePage: 'Command Center', lastSeen: firebase.database.ServerValue.TIMESTAMP });
        database.ref('chat_presence/' + myUid).onDisconnect().update({ status: 'offline', lastSeen: firebase.database.ServerValue.TIMESTAMP });

        database.ref('chat_presence').on('value', snap => {
            let area = document.getElementById('userListArea'); area.innerHTML = '';
            snap.forEach(c => {
                let u = c.val(); if(c.key === myUid) return;
                let dot = u.status === 'online' ? 'dot-online' : 'dot-offline';
                area.innerHTML += `
                <div class="user-item" onclick="vibrateClick(); document.getElementById('chatInput').value += '@${u.name.split(' ')[0]} '; document.getElementById('chatInput').focus(); toggleSidebar();">
                    <div class="user-avatar">${u.name.charAt(0)}<div class="status-dot ${dot}"></div></div>
                    <div style="flex:1; min-width:0;"><h4 style="margin:0; font-size:11px; color:var(--text-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${u.name}</h4><p style="margin:0; font-size:8px; color:var(--text-muted); font-weight:700;">${u.status==='online'? '<i class="fa-solid fa-wifi" style="color:var(--c-green);"></i> Online' : 'Offline'}</p></div>
                </div>`;
            });
        });

        // --- PINNED MESSAGE ---
        database.ref('chat_pinned').on('value', snap => {
            document.getElementById('pinnedText').innerText = snap.val() || "Belum ada instruksi penting hari ini.";
        });

        function handlePinnedClick() {
            vibrateClick();
            if(myRole === 'Administrator' || myRole === 'Developer') {
                let p = prompt("Tulis Instruksi / Pengumuman Baru (Pin):", document.getElementById('pinnedText').innerText);
                if(p !== null && p.trim() !== "") database.ref('chat_pinned').set(p);
            } else { showToast("Hanya Pimpinan yang memiliki otorisasi mengubah Pin."); }
        }

        // --- KOMPRESI GAMBAR (UKURAN LEBIH KECIL & AMAN) ---
        function prosesGambar(e) {
            let file = e.target.files[0];
            if(!file) return;
            showToast("Mengompresi gambar...");
            
            let reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                let img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let MAX_WIDTH = 600; // Kompresi ekstra kuat
                    let scaleSize = MAX_WIDTH / img.width;
                    if(scaleSize > 1) scaleSize = 1; 
                    canvas.width = img.width * scaleSize;
                    canvas.height = img.height * scaleSize;
                    
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    currentBase64Img = canvas.toDataURL('image/jpeg', 0.6); // Kualitas 60% agar Firebase tidak jebol
                    showToast("Gambar siap dikirim!");
                    document.getElementById('chatInput').placeholder = "Gambar terlampir. Keterangan...";
                    document.getElementById('chatInput').focus();
                }
            }
        }

        function formatMessage(text) {
            if(!text) return "";
            text = text.replace(/(@\S+)/g, '<span class="mention-tag">$1</span>');
            return text;
        }

        async function kirimPesan() {
            vibrateClick();
            let inp = document.getElementById('chatInput'); let text = inp.value.trim();
            if(text === "" && currentBase64Img === "") return;
            
            let msgId = "MSG-" + Date.now();
            let payload = {
                id: msgId, uid: myUid, name: myName, text: text, img: currentBase64Img,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                isDeleted: false, status: 'sent', replyTo: replyId
            };

            let btnSend = document.querySelector('.btn-send');
            btnSend.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btnSend.disabled = true;

            try {
                await database.ref('chat_messages/' + msgId).set(payload);
                inp.value = ""; inp.placeholder = "Ketik atau panggil @Sistem...";
                currentBase64Img = ""; cancelReply(); 

                // --- BOT ASISTEN @SISTEM ---
                if(text.includes('@Sistem') || text.includes('@sistem')) {
                    setTimeout(async () => {
                        let botMsg = "Halo! Saya Bot Sistem. Fitur cek data spesifik sedang dikembangkan. Untuk sementara, silakan cek menu Jurnal Kas atau Rekap Piutang langsung.";
                        if(text.toLowerCase().includes('saldo')) botMsg = "Berdasarkan rekaman terakhir, untuk melihat Saldo Bersih, Anda bisa membuka menu [Laporan Tutup Buku].";
                        
                        let botId = "BOT-" + Date.now();
                        await database.ref('chat_messages/' + botId).set({
                            id: botId, uid: 'bot_system', name: '🤖 Sistem (Auto)', text: botMsg,
                            timestamp: firebase.database.ServerValue.TIMESTAMP, isDeleted: false, status: 'read', replyTo: msgId
                        });
                        soundEl.play().catch(e=>{});
                    }, 1000);
                }

            } catch(e) {
                showToast("Gagal mengirim pesan. Periksa koneksi.");
            }
            
            btnSend.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
            btnSend.disabled = false;
        }

        // --- LISTENER PESAN REALTIME (AUTO-DELETE 7 HARI) ---
        let isFirstLoad = true;
        database.ref('chat_messages').limitToLast(100).on('value', snap => {
            let box = document.getElementById('chatBox'); 
            box.innerHTML = '<div style="text-align:center; color:var(--c-green); font-size:9px; margin:5px 0; font-weight: 700; padding: 6px; background: rgba(0,0,0,0.03); border-radius: 10px;"><i class="fa-solid fa-shield-halved"></i> Komunikasi Terenkripsi & Gambar Hangus 7 Hari.</div>';
            
            let hasNewMessage = false;
            let nowTime = Date.now();
            let sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
            
            rawMessagesForPDF = [];

            snap.forEach(c => {
                let m = c.val();
                
                // AUTO DELETE GAMBAR LAMA (7 HARI) UNTUK HEMAT STORAGE
                if (m.img && m.timestamp && (nowTime - m.timestamp > sevenDaysMs)) {
                    database.ref('chat_messages/'+m.id).update({ img: null });
                    m.img = null;
                }
                
                rawMessagesForPDF.push(m); // Simpan untuk PDF

                if(m.uid !== myUid && m.status !== 'read') {
                    database.ref('chat_messages/'+m.id).update({status:'read'});
                    hasNewMessage = true; 
                }

                let isMe = m.uid === myUid;
                let replyHtml = "";
                if(m.replyTo) {
                    replyHtml = `<div class="reply-context" onclick="scrollToMsg('${m.replyTo}')"><i class="fa-solid fa-reply"></i> Membalas pesan...</div>`;
                }

                let d = new Date(m.timestamp || Date.now());
                let wkt = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
                let statusIcon = m.status === 'read' ? '<i class="fa-solid fa-check-double" style="color:#3b82f6;"></i>' : '<i class="fa-solid fa-check"></i>';

                let reaksiHtml = m.reaction ? `<div class="reaction-badge">${m.reaction}</div>` : '';
                let contentHtml = m.isDeleted ? `<i style="color:var(--text-muted);"><i class="fa-solid fa-ban"></i> 🚫 Pesan ini telah dihapus</i>` : formatMessage(m.text);

                box.innerHTML += `
                <div class="bubble-wrapper ${isMe?'wrapper-out':'wrapper-in'}" id="${m.id}">
                    ${!isMe ? `<div style="font-size:9px; font-weight:900; margin-bottom:4px; color:var(--text-muted); font-family:'Montserrat'; padding-left:5px;">${m.name}</div>` : ''}
                    <div class="chat-bubble ${isMe?'bubble-out':'bubble-in'}" onclick="bukaActionModal('${m.id}', '${m.uid}', '${m.name}', '${m.text||'Gambar'}', ${m.isDeleted})">
                        ${replyHtml}
                        ${(m.img && !m.isDeleted) ? `<img src="${m.img}" class="chat-img" onclick="event.stopPropagation(); window.open('${m.img}')">` : ''}
                        <div>${contentHtml}</div>
                        <div style="font-size:9px; text-align:right; margin-top:5px; opacity:0.8; font-weight:700;">
                            ${wkt} ${isMe ? statusIcon : ''}
                        </div>
                    </div>
                    ${reaksiHtml}
                </div>`;
            });
            
            box.scrollTop = box.scrollHeight;
            
            if(!isFirstLoad && hasNewMessage) soundEl.play().catch(e=>{});
            isFirstLoad = false;
        });

        // --- POPUP ACTION MENU ---
        let selectedMsgData = {};
        function bukaActionModal(id, uid, name, text, isDeleted) {
            if(isDeleted) return; // Pesan terhapus tidak bisa diapa-apakan
            vibrateClick();
            selectedMsgId = id;
            selectedMsgData = {name: name, text: text};
            
            // Tampilkan tombol hapus HANYA jika itu pesan sendiri
            document.getElementById('btnHapusPesan').style.display = (uid === myUid) ? 'block' : 'none';
            
            document.getElementById('actionModal').classList.add('show');
            document.getElementById('actionOverlay').classList.add('show');
        }

        function tutupActionModal() {
            document.getElementById('actionModal').classList.remove('show');
            document.getElementById('actionOverlay').classList.remove('show');
            selectedMsgId = null;
        }

        function siapkanBalasan() {
            vibrateClick();
            replyId = selectedMsgId; 
            document.getElementById('replyTargetName').innerText = "Membalas " + selectedMsgData.name;
            document.getElementById('replyTargetText').innerText = selectedMsgData.text;
            document.getElementById('replyPreview').style.display = 'block';
            tutupActionModal();
            document.getElementById('chatInput').focus();
        }
        function cancelReply() { replyId = null; document.getElementById('replyPreview').style.display = 'none'; }

        function kirimReaksi(emoji) {
            vibrateClick();
            if(selectedMsgId) {
                database.ref('chat_messages/' + selectedMsgId).update({ reaction: emoji });
            }
            tutupActionModal();
        }

        function hapusPesanSendiri() {
            vibrateHeavy();
            if(confirm("Tarik pesan ini untuk semua orang? (Pesan akan berubah menjadi teks 'Telah Dihapus')")) {
                database.ref('chat_messages/' + selectedMsgId).update({ 
                    isDeleted: true, text: "", img: null, reaction: null 
                });
                tutupActionModal();
                showToast("Pesan berhasil ditarik.");
            }
        }

        function scrollToMsg(id) { 
            vibrateClick();
            let el = document.getElementById(id); 
            if(el) {
                el.scrollIntoView({behavior: 'smooth', block: 'center'}); 
                let bubble = el.querySelector('.chat-bubble');
                let oldBg = bubble.style.background;
                bubble.style.background = "var(--c-orange)"; 
                setTimeout(()=>bubble.style.background=oldBg, 1500); 
            }
        }

        // --- EKSPOR PDF RIWAYAT ---
        function eksporPDFChat() {
            vibrateClick();
            if(myRole === 'Operator') { showToast("Akses Ditolak!"); return; }
            
            document.getElementById('wktCetakPDF').innerText = new Date().toLocaleString('id-ID');
            let tbody = document.getElementById('pdfBody'); tbody.innerHTML = '';
            
            rawMessagesForPDF.forEach(m => {
                let d = new Date(m.timestamp).toLocaleString('id-ID', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
                let t = m.isDeleted ? "🚫 Pesan ditarik" : (m.text || "[Gambar Terlampir]");
                tbody.innerHTML += `<tr>
                    <td style="border:1px solid #000; padding:5px;">${d}</td>
                    <td style="border:1px solid #000; padding:5px;"><b>${m.name}</b></td>
                    <td style="border:1px solid #000; padding:5px;">${t}</td>
                </tr>`;
            });

            showToast("Mempersiapkan PDF Chat...");
            let opt = { 
                margin: 0.5, filename: `Audit_Chat_MMUB77_${Date.now()}.pdf`, 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } 
            };
            
            document.getElementById('print-area').style.display = 'block';
            html2pdf().set(opt).from(document.getElementById('print-area')).save().then(()=>{
                document.getElementById('print-area').style.display = 'none';
                showToast("PDF Audit Chat berhasil diunduh.");
            });
        }
    </script>
</body>
</html>
