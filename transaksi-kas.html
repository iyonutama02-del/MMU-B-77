<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e0e5ec" id="meta-theme-color">
    <title>Transaksi Kas - MMU B-77</title>
    
    <link rel="icon" type="image/png" href="Logo-Favicon.png">
    <link rel="apple-touch-icon" href="Logo-Favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // --- PENGAMANAN MUTLAK ---
        if (!localStorage.getItem('usernameAsli')) {
            window.location.replace('index.html');
        }

        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>

    <style>
        :root {
            --bg-main: #e0e5ec; --text-dark: #31344b; --text-muted: #8C96A3;
            --shadow-dark: rgba(163, 177, 198, 0.6); --shadow-light: rgba(255, 255, 255, 0.6);
            --grad-blue: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --grad-green: linear-gradient(135deg, #2df077 0%, #00d26a 100%);
            --grad-red: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --c-green: #00d26a; --c-red: #ff758c;
        }
        [data-theme="dark"] {
            --bg-main: #2d3748; --text-dark: #f0f4f8; --text-muted: #a0aec0;
            --shadow-dark: #202835; --shadow-light: #3a4556;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg-main); font-family: 'Poppins', sans-serif; color: var(--text-dark); margin:0; padding:0; padding-bottom:50px; transition:0.3s;}
        .app-container { max-width: 600px; margin: 0 auto; padding: 25px 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;}
        .btn-icon { width: 45px; height: 45px; border-radius: 15px; background: var(--bg-main); display: flex; justify-content: center; align-items: center; color: var(--text-dark); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); border: none; cursor: pointer; transition: 0.2s;}
        .btn-icon:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .header-title { font-family:'Montserrat'; font-size:18px; font-weight:900; margin:0; text-transform:uppercase; letter-spacing:1px; }

        .saldo-card { background: var(--grad-blue); border-radius: 25px; padding: 30px 20px; margin-bottom: 25px; box-shadow: 8px 8px 16px rgba(79, 172, 254, 0.4); text-align: center; color: white; position: relative; overflow: hidden;}
        .saldo-label { font-size: 11px; font-weight: 700; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .saldo-value { font-family: 'Montserrat'; font-weight: 900; font-size: 32px; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        .tab-container { display: flex; background: var(--bg-main); border-radius: 15px; padding: 8px; margin-bottom: 25px; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); }
        .tab-btn { flex: 1; text-align: center; padding: 14px 0; border-radius: 12px; font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .tab-btn.active.masuk { background: var(--bg-main); color: var(--c-green); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }
        .tab-btn.active.keluar { background: var(--bg-main); color: var(--c-red); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }

        .form-section { display: none; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }
        .form-card { background: var(--bg-main); border-radius: 25px; padding: 25px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); }
        
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; margin-left: 5px; }
        .input-edit { width: 100%; padding: 15px 20px; border: none; border-radius: 15px; background: var(--bg-main); font-family: 'Poppins'; font-size: 13px; font-weight: 600; color: var(--text-dark); box-shadow: inset 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); outline: none; transition: 0.3s; appearance: none; }
        .input-edit:focus { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 2px rgba(79, 172, 254, 0.3); }
        .input-readonly { background: transparent; color: var(--text-muted); pointer-events: none; box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);}

        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 15px; font-family: 'Montserrat'; font-weight: 800; font-size: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s; color: white; margin-top: 10px;}
        .btn-submit.masuk { background: var(--grad-green); box-shadow: 5px 5px 15px rgba(0, 210, 106, 0.4); }
        .btn-submit.keluar { background: var(--grad-red); box-shadow: 5px 5px 15px rgba(255, 117, 140, 0.4); }
        .btn-submit:active { transform: translateY(2px); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }
        .btn-submit:disabled { background: var(--text-muted); box-shadow: none; cursor: not-allowed; opacity: 0.7; }

        #toast { visibility: hidden; min-width: 250px; background-color: #31344b; color: #fff; text-align: center; border-radius: 15px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; font-size: 12px; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;}
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s forwards; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224, 229, 236, 0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px);}
        .neumorphic-spinner { width: 50px; height: 50px; border-radius: 50%; background: var(--bg-main); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); border: 4px solid transparent; border-top-color: var(--c-blue); animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast"><i class="fa-solid fa-circle-info"></i> <span id="toastMsg">Pesan</span></div>
    
    <div class="loading-overlay" id="loadingLayar">
        <div class="neumorphic-spinner"></div>
        <h3 style="font-family:'Montserrat'; margin:0; color:var(--text-dark);">Menyimpan Transaksi...</h3>
    </div>

    <div class="app-container">
        <div class="nav-top">
            <button class="btn-icon" onclick="window.location.href='beranda.html'"><i class="fa-solid fa-angle-left"></i></button>
            <h1 class="header-title">Transaksi Kas</h1>
            <div style="width: 45px;"></div>
        </div>

        <div class="saldo-card">
            <div class="saldo-label"><i class="fa-solid fa-money-bill-wave"></i> SALDO KAS MADRASAH</div>
            <h2 class="saldo-value" id="saldoAplikasi">Rp ...</h2>
        </div>

        <div class="tab-container">
            <div class="tab-btn active masuk" onclick="switchTab('masuk', this)"><i class="fa-solid fa-arrow-down"></i> Kas Masuk</div>
            <div class="tab-btn keluar" onclick="switchTab('keluar', this)"><i class="fa-solid fa-arrow-up"></i> Kas Keluar</div>
        </div>

        <div class="form-section active" id="sec-masuk">
            <div class="form-card">
                <form id="formMasuk">
                    <div class="input-group">
                        <label>Admin/Penerima (Otomatis)</label>
                        <input type="text" class="input-edit input-readonly" id="m_admin" readonly>
                    </div>
                    <div class="input-group">
                        <label>Pos Pemasukan (Sinkron Master)</label>
                        <select class="input-edit" id="m_kategori" required style="cursor: pointer;">
                            <option value="">-- Memuat Pos Pemasukan... --</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Nominal Pemasukan (Rp)</label>
                        <input type="number" class="input-edit" id="m_nominal" placeholder="0" required min="1">
                    </div>
                    <div class="input-group">
                        <label>Diterima Dari / Sumber Dana</label>
                        <input type="text" class="input-edit" id="m_sumber" placeholder="Cth: Hamba Allah / Koperasi" required>
                    </div>
                    <div class="input-group">
                        <label>Keterangan Tambahan</label>
                        <input type="text" class="input-edit" id="m_keterangan" placeholder="Cth: Infaq Jumat minggu pertama">
                    </div>
                    <button type="submit" class="btn-submit masuk" id="btnSubmitMasuk"><i class="fa-solid fa-floppy-disk"></i> SIMPAN KAS MASUK</button>
                </form>
            </div>
        </div>

        <div class="form-section" id="sec-keluar">
            <div class="form-card">
                <form id="formKeluar">
                    <div class="input-group">
                        <label>Admin/Pengeluar (Otomatis)</label>
                        <input type="text" class="input-edit input-readonly" id="k_admin" readonly>
                    </div>
                    <div class="input-group">
                        <label>Pos Pengeluaran (Sinkron Master)</label>
                        <select class="input-edit" id="k_kategori" required style="cursor: pointer;">
                            <option value="">-- Memuat Pos Pengeluaran... --</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Nominal Pengeluaran (Rp)</label>
                        <input type="number" class="input-edit" id="k_nominal" placeholder="0" required min="1">
                    </div>
                    <div class="input-group">
                        <label>Diberikan Kepada / Tujuan Dana</label>
                        <input type="text" class="input-edit" id="k_sumber" placeholder="Cth: Toko Bangunan / Ust. Fulan" required>
                    </div>
                    <div class="input-group">
                        <label>Keterangan Tambahan</label>
                        <input type="text" class="input-edit" id="k_keterangan" placeholder="Cth: Beli 2 sak semen untuk kelas">
                    </div>
                    <button type="submit" class="btn-submit keluar" id="btnSubmitKeluar"><i class="fa-solid fa-floppy-disk"></i> SIMPAN KAS KELUAR</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        const formatRp = (n) => 'Rp ' + parseInt(n || 0).toLocaleString('id-ID');
        let currentSaldo = 0;

        function vibrateClick() { if(navigator.vibrate) navigator.vibrate(30); }
        function vibrateHeavy() { if(navigator.vibrate) navigator.vibrate(500); }
        function vibrateSuccess() { if(navigator.vibrate) navigator.vibrate([30, 50, 30]); }

        function showToast(msg) {
            let t = document.getElementById("toast"); document.getElementById("toastMsg").innerText = msg;
            t.className = "show"; setTimeout(() => t.className = t.className.replace("show", ""), 3000);
        }

        function switchTab(jenis, el) {
            vibrateClick();
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'masuk', 'keluar'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            el.classList.add('active', jenis);
            document.getElementById('sec-' + jenis).classList.add('active');
        }

        // --- KEAMANAN AUTO-LOGOUT 15 MENIT ---
        let waktuLogout;
        function resetTimerLogout() {
            clearTimeout(waktuLogout);
            waktuLogout = setTimeout(() => {
                vibrateHeavy(); showToast("Sesi habis. Anda dikeluarkan demi keamanan.");
                setTimeout(() => { localStorage.removeItem('usernameAsli'); window.location.replace('index.html'); }, 2500);
            }, 15 * 60 * 1000); 
        }
        window.onload = resetTimerLogout; document.onmousemove = resetTimerLogout; document.onkeypress = resetTimerLogout; document.ontouchstart = resetTimerLogout;

        async function catatAuditTrail(aksi, detail) {
            try {
                await database.ref('audit_trail').push({
                    Waktu: new Date().toLocaleString('id-ID'), Eksekutor: localStorage.getItem('namaPengguna') || 'Unknown',
                    Role: localStorage.getItem('hakAkses') || 'Unknown', Menu: 'Transaksi Kas', Aksi: aksi, Detail: detail
                });
            } catch(e) {}
        }

        window.addEventListener('DOMContentLoaded', () => {
            let namaAdmin = localStorage.getItem('namaPengguna') || 'Admin';
            document.getElementById('m_admin').value = namaAdmin;
            document.getElementById('k_admin').value = namaAdmin;

            let ta = localStorage.getItem('globalTahunAjaran');
            let bln = localStorage.getItem('globalBulanAktif');
            if(!ta || !bln || ta === "Belum Disetel" || bln === "Belum Disetel") {
                showToast("⚠️ Peringatan: Waktu Global belum disetel. Tombol simpan dinonaktifkan!");
                document.getElementById('btnSubmitMasuk').disabled = true;
                document.getElementById('btnSubmitKeluar').disabled = true;
            }

            // HITUNG SALDO KESELURUHAN (MENCEGAH DEFISIT GAIB)
            database.ref('buku_kas').on('value', snap => {
                let totalM = 0; let totalK = 0;
                snap.forEach(c => {
                    let d = c.val();
                    if(d.Jenis === 'MASUK') totalM += parseInt(d.Nominal || 0);
                    else if(d.Jenis === 'KELUAR') totalK += parseInt(d.Nominal || 0);
                });
                currentSaldo = totalM - totalK;
                document.getElementById('saldoAplikasi').innerText = formatRp(currentSaldo);
            });

            // --- TAMBAHAN SINKRONISASI POS KEUANGAN ---
            database.ref('kode_keuangan').on('value', snap => {
                let optMasuk = '<option value="">-- Pilih Pos Pemasukan --</option>';
                let optKeluar = '<option value="">-- Pilih Pos Pengeluaran --</option>';
                
                snap.forEach(child => {
                    let k = child.val();
                    if(String(k.Status).toLowerCase() !== 'nonaktif') {
                        let jenis = String(k.Jenis).toLowerCase();
                        let id = String(child.key);
                        
                        if(jenis.includes('masuk') || jenis.includes('pemasukan') || id.startsWith('1') || id.startsWith('2')) {
                            optMasuk += `<option value="${k.Nama_Pos}">${k.Nama_Pos}</option>`;
                        } else if(jenis.includes('keluar') || jenis.includes('pengeluaran') || id.startsWith('5') || id.startsWith('6')) {
                            optKeluar += `<option value="${k.Nama_Pos}">${k.Nama_Pos}</option>`;
                        }
                    }
                });
                
                document.getElementById('m_kategori').innerHTML = optMasuk;
                document.getElementById('k_kategori').innerHTML = optKeluar;
            });
            // ------------------------------------------
        });

        // FUNGSI SIMPAN TRANSAKSI
        async function prosesTransaksi(tipe) {
            vibrateClick();
            if (!navigator.onLine) { showToast("Sinyal Terputus! Aksi diblokir."); vibrateHeavy(); return; }

            let prefix = tipe === 'MASUK' ? 'm_' : 'k_';
            let nominal = parseInt(document.getElementById(prefix + 'nominal').value);
            let kategori = document.getElementById(prefix + 'kategori').value;
            let sumber = document.getElementById(prefix + 'sumber').value;
            let keterangan = document.getElementById(prefix + 'keterangan').value || "-";
            let admin = document.getElementById(prefix + 'admin').value;

            // CEK DEFISIT UNTUK KAS KELUAR
            if(tipe === 'KELUAR' && nominal > currentSaldo) {
                showToast("❌ DITOLAK: Saldo Kas Tidak Cukup!"); vibrateHeavy(); return;
            }

            let btn = document.getElementById(tipe === 'MASUK' ? 'btnSubmitMasuk' : 'btnSubmitKeluar');
            btn.disabled = true; let originalTxt = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            document.getElementById('loadingLayar').style.display = 'flex';

            try {
                let ts = new Date().getTime();
                let waktu = new Date().toLocaleString('id-ID');
                let ta = localStorage.getItem('globalTahunAjaran');
                let bln = localStorage.getItem('globalBulanAktif');
                let ta_angka = ta.replace(/\D/g, '').slice(-4);
                let smartID = `TRX-${tipe === 'MASUK'?'IN':'OUT'}-${ta_angka}-${ts}`;

                let data = {
                    ID_Transaksi: smartID, Waktu: waktu, Kategori_Nama: kategori,
                    Nominal: nominal, Sumber: sumber, Keterangan: keterangan,
                    Admin_Penerima: admin, Jenis: tipe, Tahun_Ajaran: ta, Bulan_Hijriyah: bln
                };

                let updates = {};
                updates[`buku_kas/${smartID}`] = data;
                if(tipe === 'MASUK') updates[`kas_masuk/${smartID}`] = data;
                else updates[`kas_keluar/${smartID}`] = data;

                await database.ref().update(updates);
                await catatAuditTrail('Transaksi Manual', `Mencatat Kas ${tipe}: ${kategori} senilai ${formatRp(nominal)}`);

                showToast(`Transaksi Kas ${tipe} Berhasil Disimpan!`); vibrateSuccess();
                document.getElementById(tipe === 'MASUK' ? 'formMasuk' : 'formKeluar').reset();
                document.getElementById(prefix + 'admin').value = admin;

            } catch(e) {
                showToast("Gagal menyimpan ke server!"); vibrateHeavy();
            } finally {
                btn.disabled = false; btn.innerHTML = originalTxt;
                document.getElementById('loadingLayar').style.display = 'none';
            }
        }

        document.getElementById('formMasuk').onsubmit = e => { e.preventDefault(); prosesTransaksi('MASUK'); };
        document.getElementById('formKeluar').onsubmit = e => { e.preventDefault(); prosesTransaksi('KELUAR'); };
    </script>
</body>
</html>
