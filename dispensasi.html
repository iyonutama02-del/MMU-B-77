<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e0e5ec" id="meta-theme-color">
    <title>Dispensasi - Keuangan MMU B-77</title>
    
    <link rel="icon" type="image/png" href="Logo-Favicon.png">
    <link rel="apple-touch-icon" href="Logo-Favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const role = localStorage.getItem('hakAkses');
        if(role === 'Operator' || role === 'Demo') {
            alert("🔒 AKSES DIBATASI: Khusus Administrator/Pimpinan yang berhak memberi Dispensasi.");
            window.location.replace('beranda.html');
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>

    <style>
        /* --- TEMA NEUMORPHISM PREMIUM --- */
        :root {
            --bg-main: #e0e5ec; --text-dark: #31344b; --text-muted: #8C96A3;
            --shadow-dark: rgba(163, 177, 198, 0.6); --shadow-light: rgba(255, 255, 255, 0.6);
            --c-orange: #f59e0b; --c-green: #00d26a; --c-red: #ef4444;
        }
        [data-theme="dark"] {
            --bg-main: #2d3748; --text-dark: #f0f4f8; --text-muted: #a0aec0;
            --shadow-dark: #202835; --shadow-light: #3a4556;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg-main); font-family: 'Poppins', sans-serif; color: var(--text-dark); margin:0; padding:0; padding-bottom:50px; transition:0.3s;}
        
        .app-container { max-width: 600px; margin: 0 auto; padding: 25px 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;}
        .btn-icon { width: 45px; height: 45px; border-radius: 15px; background: var(--bg-main); display: flex; justify-content: center; align-items: center; color: var(--text-dark); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); border: none; cursor: pointer; transition: 0.2s;}
        .btn-icon:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .header-title { font-family:'Montserrat'; font-size:18px; font-weight:900; margin:0; text-transform:uppercase; letter-spacing:1px; }

        /* WIDGET TOTAL */
        .summary-card { background: var(--bg-main); border-radius: 25px; padding: 25px; margin-bottom: 25px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); display: flex; align-items: center; gap: 20px; border-bottom: 4px solid var(--c-orange);}
        .summary-card i { font-size: 35px; color: var(--c-orange); text-shadow: 2px 2px 4px var(--shadow-dark); }
        
        /* TABS */
        .tab-container { display: flex; background: var(--bg-main); border-radius: 15px; padding: 8px; margin-bottom: 25px; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); }
        .tab-btn { flex: 1; text-align: center; padding: 12px 0; border-radius: 12px; font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--bg-main); color: var(--c-orange); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }

        .form-section { display: none; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }

        /* SEARCH AREA */
        .panel-card { background: var(--bg-main); border-radius: 20px; padding: 20px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); margin-bottom:20px;}
        .input-group { margin-bottom: 15px; position: relative;}
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; margin-left: 5px; }
        .input-edit { width: 100%; padding: 15px 20px; border: none; border-radius: 15px; background: var(--bg-main); font-family: 'Poppins'; font-size: 13px; color: var(--text-dark); box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); outline: none; transition: 0.3s; font-weight:600; appearance: none;}
        .input-edit:focus { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 2px rgba(245, 158, 11, 0.3); }

        /* AUTOCOMPLETE */
        .sug-box { position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-main); border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 100; max-height: 200px; overflow-y: auto; display: none; margin-top: 8px; padding: 5px;}
        .sug-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); font-weight:600;}
        .sug-item:hover { background: rgba(245, 158, 11, 0.1); color: var(--c-orange); }

        /* DAFTAR SANTRI BERHUTANG (NEW) */
        .student-bill-card { background: var(--bg-main); border-radius: 18px; padding: 18px 20px; margin-bottom: 15px; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; border-left: 4px solid var(--c-orange);}
        .student-bill-card:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .sb-name { margin:0; font-size:14px; font-family:'Montserrat'; font-weight:800; color:var(--text-dark); }
        .sb-info { margin:3px 0 0 0; font-size:10px; color:var(--text-muted); font-weight:600; }
        .sb-total { font-size:14px; font-weight:800; color:var(--c-red); }
        
        .btn-kembali { background: transparent; color: var(--text-muted); border: none; font-family: 'Poppins'; font-weight: 700; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; transition: 0.2s; padding: 10px; border-radius: 10px;}
        .btn-kembali:active { background: rgba(0,0,0,0.05); }

        /* CARD TAGIHAN (HASIL CARI) */
        .card-tagihan { background: var(--bg-main); border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--c-orange);}
        .btn-beri { background: var(--bg-main); color: var(--c-orange); border: none; padding: 10px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; font-family:'Montserrat'; cursor: pointer; box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); transition:0.2s;}
        .btn-beri:active { box-shadow: inset 2px 2px 5px var(--shadow-dark); }

        /* RIWAYAT TABLE */
        .table-wrapper { overflow-x: auto; background: var(--bg-main); padding: 15px; border-radius: 20px; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        th { color: var(--text-muted); padding: 15px 12px; border-bottom: 2px dashed rgba(0,0,0,0.1); font-family: 'Montserrat'; font-weight:800;}
        td { padding: 15px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); font-weight:600;}

        /* MODAL AUDIT NEUMORPHIC */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224, 229, 236, 0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        [data-theme="dark"] .modal-overlay { background: rgba(45, 55, 72, 0.8); }
        .modal-content { background: var(--bg-main); width: 100%; max-width: 350px; border-radius: 25px; padding: 30px; box-shadow: 10px 10px 30px rgba(0,0,0,0.2); }
        
        .btn-modal-ok { width: 100%; padding: 15px; background: var(--bg-main); color: var(--c-green); border: none; border-radius: 15px; font-weight: 800; font-family:'Montserrat'; cursor: pointer; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); margin-top: 10px;}
        .btn-modal-ok:active { box-shadow: inset 2px 2px 5px var(--shadow-dark); }
        .btn-modal-cancel { width: 100%; margin-top: 15px; padding: 10px; border: none; background: transparent; color: var(--c-red); font-weight:700; cursor: pointer; }

        #toast { visibility: hidden; min-width: 250px; background-color: #31344b; color: #fff; text-align: center; border-radius: 15px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; font-size: 12px; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: 600; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s forwards; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body>

    <div id="toast"><span>Pesan</span></div>

    <div class="app-container">
        <div class="nav-top">
            <button class="btn-icon" onclick="window.location.href='beranda.html'"><i class="fa-solid fa-angle-left"></i></button>
            <h1 class="header-title">Dispensasi</h1>
            <div style="width: 45px;"></div>
        </div>

        <div class="summary-card">
            <i class="fa-solid fa-hand-holding-heart"></i>
            <div>
                <p style="margin:0; font-size:10px; font-weight:700; color:var(--text-muted);">TOTAL DANA DIBEBASKAN</p>
                <h2 id="sumDana" style="margin:0; font-family:'Montserrat'; font-size:24px; font-weight:900; color:var(--text-dark);">Rp 0</h2>
            </div>
        </div>

        <div class="tab-container">
            <div class="tab-btn active" onclick="bukaTab('beri', this)">Beri Baru</div>
            <div class="tab-btn" onclick="bukaTab('riwayat', this)">Riwayat / Log</div>
        </div>

        <div class="form-section active" id="sec-beri">
            <div class="panel-card">
                <div class="input-group" style="margin-bottom:0;">
                    <label>Cari Cepat (Nama/NIS)</label>
                    <input type="text" class="input-edit" id="cariPintar" placeholder="Ketik nama santri..." onkeyup="tampilkanSaran()" autocomplete="off">
                    <div class="sug-box" id="sugBox"></div>
                </div>
            </div>
            
            <!-- AREA 1: DAFTAR ANTREAN SANTRI -->
            <div id="areaDaftarSantri">
                <div style="text-align:center; padding:40px 20px; color:var(--text-muted);">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size:30px; margin-bottom:15px;"></i><br>Memuat antrean dispensasi...
                </div>
            </div>

            <!-- AREA 2: RINCIAN TAGIHAN SANTRI (MUNCUL SAAT DIKLIK) -->
            <div id="areaRincian" style="display:none;">
                <button class="btn-kembali" onclick="kembaliKeDaftar()"><i class="fa-solid fa-arrow-left"></i> Kembali ke Antrean</button>
                <div id="hasilPencarian"></div>
            </div>
        </div>

        <div class="form-section" id="sec-riwayat">
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Tanggal</th><th>Santri</th><th>Pos Tagihan</th><th style="text-align:right;">Nominal Bebas</th></tr></thead>
                    <tbody id="bodyRiwayat"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL AUDIT DISPENSASI -->
    <div class="modal-overlay" id="modalDisp">
        <div class="modal-content">
            <h2 style="font-family:'Montserrat'; font-size:18px; font-weight:900; color:var(--c-orange); margin-top:0; text-align:center;">Bebaskan Tagihan</h2>
            <p style="text-align:center; font-size:11px; color:var(--text-muted); margin-bottom:20px;">Aksi ini akan terekam secara permanen di server dengan nama akun Anda.</p>
            <form id="formDisp">
                <input type="hidden" id="mIdTagihan">
                <div class="input-group">
                    <label>Pilih Alasan Audit</label>
                    <select class="input-edit" id="mAlasan" required style="cursor: pointer;">
                        <option value="Beasiswa Yatim">Beasiswa Yatim / Piatu</option>
                        <option value="Keluarga Kurang Mampu">Keluarga Kurang Mampu / Dhuafa</option>
                        <option value="Kebijakan Pimpinan">Kebijakan Khusus Pimpinan</option>
                        <option value="Beasiswa Prestasi">Penghargaan / Prestasi</option>
                        <option value="Lainnya">Lainnya...</option>
                    </select>
                </div>
                <button type="submit" class="btn-modal-ok"><i class="fa-solid fa-check-double"></i> KONFIRMASI BEBASKAN</button>
                <button type="button" class="btn-modal-cancel" onclick="tutupModal()">Batalkan</button>
            </form>
        </div>
    </div>

    <script>
        let listTagihan = []; let listRiwayat = [];
        let dbSantriUtama = []; // REFERENSI MUTLAK KE DATABASE SANTRI
        let idSantriAktif = null;
        
        const formatRupiah = (n) => 'Rp ' + parseInt(n || 0).toLocaleString('id-ID');
        function showToast(msg) { let t = document.getElementById("toast"); t.querySelector("span").innerText = msg; t.className = "show"; setTimeout(() => { t.className = ""; }, 3000); }

        window.onload = function() {
            // SINKRONISASI 2 ARAH SEKALIGUS
            database.ref('santri').on('value', snap => {
                dbSantriUtama = [];
                snap.forEach(c => dbSantriUtama.push(c.val()));
                if(listTagihan.length > 0) renderDaftarSantriBerhutang(); 
            });

            database.ref('tagihan').on('value', snap => {
                listTagihan = []; listRiwayat = []; let total = 0;
                snap.forEach(c => {
                    let r = c.val();
                    if(r.Status === 'Belum Lunas' || r.Status === 'Cicilan') listTagihan.push(r);
                    else if(String(r.Status).includes('Dispensasi')) { 
                        listRiwayat.push(r); 
                        let sisa = r.Status === 'Cicilan' ? (parseInt(r.Nominal) - parseInt(r.Terbayar || 0)) : parseInt(r.Nominal);
                        total += sisa; 
                    }
                });
                
                document.getElementById('sumDana').innerText = formatRupiah(total);
                renderRiwayat();
                
                if(dbSantriUtama.length > 0) renderDaftarSantriBerhutang();
                
                if(idSantriAktif) renderFilter(idSantriAktif);
            });
        };

        // FUNGSI PENGUNCI NAMA MUTLAK DARI DATABASE SANTRI
        function getNamaMutlak(idMurid, namaFallback) {
            let santri = dbSantriUtama.find(s => String(s.ID_Murid) === String(idMurid));
            if (santri) return (santri.Nama_Lengkap || santri.Nama_Santri || "Tanpa Nama");
            return (namaFallback || "Hamba Allah");
        }

        function bukaTab(tipe, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            el.classList.add('active'); document.getElementById('sec-' + tipe).classList.add('active');
        }

        function renderDaftarSantriBerhutang() {
            let rekap = {};
            
            listTagihan.forEach(t => {
                if(!rekap[t.ID_Murid]) {
                    let namaValid = getNamaMutlak(t.ID_Murid, t.Nama_Santri);
                    rekap[t.ID_Murid] = { id: t.ID_Murid, nama: namaValid, kelas: t.Kelas, count: 0, total: 0 };
                }
                rekap[t.ID_Murid].count++;
                let sisa = t.Status === 'Cicilan' ? (parseInt(t.Nominal) - parseInt(t.Terbayar || 0)) : parseInt(t.Nominal);
                rekap[t.ID_Murid].total += sisa;
            });

            let wadah = document.getElementById('areaDaftarSantri');
            let arrRekap = Object.values(rekap).sort((a,b) => a.nama.localeCompare(b.nama));
            
            if(arrRekap.length === 0) {
                wadah.innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--c-green); font-weight:700;"><i class="fa-solid fa-check-circle" style="font-size:50px; margin-bottom:15px;"></i><br>Alhamdulillah, tidak ada tagihan yang bisa dibebaskan saat ini.</div>`;
                return;
            }

            wadah.innerHTML = `<h3 style="font-size:11px; color:var(--text-muted); margin-bottom:15px; text-transform:uppercase; letter-spacing:1px;">PILIH SANTRI (${arrRekap.length} ORANG)</h3>`;
            
            arrRekap.forEach(r => {
                wadah.innerHTML += `
                <div class="student-bill-card" onclick="bukaTagihanSantri('${r.id}', '${r.nama.replace(/'/g, "\\'")}')">
                    <div>
                        <h4 class="sb-name">${r.nama}</h4>
                        <p class="sb-info">Kelas: ${r.kelas} • ${r.count} Item Tagihan</p>
                    </div>
                    <div style="text-align:right;">
                        <span class="sb-total">${formatRupiah(r.total)}</span>
                        <i class="fa-solid fa-chevron-right" style="color:var(--text-muted); margin-left:10px; font-size:12px;"></i>
                    </div>
                </div>`;
            });
        }

        function bukaTagihanSantri(idMurid, namaSantri) {
            idSantriAktif = idMurid;
            document.getElementById('areaDaftarSantri').style.display = 'none';
            document.getElementById('areaRincian').style.display = 'block';
            document.getElementById('cariPintar').value = namaSantri;
            renderFilter(idMurid);
        }

        function kembaliKeDaftar() {
            idSantriAktif = null;
            document.getElementById('areaRincian').style.display = 'none';
            document.getElementById('areaDaftarSantri').style.display = 'block';
            document.getElementById('cariPintar').value = '';
            document.getElementById('hasilPencarian').innerHTML = '';
        }

        function tampilkanSaran() {
            let input = document.getElementById('cariPintar').value.toLowerCase();
            let box = document.getElementById('sugBox'); box.innerHTML = '';
            if(input.length < 2) { box.style.display = 'none'; return; }
            
            let hasilUnik = [];
            listTagihan.forEach(t => {
                let namaValid = getNamaMutlak(t.ID_Murid, t.Nama_Santri).toLowerCase();
                if((namaValid.includes(input) || String(t.ID_Murid).includes(input)) && !hasilUnik.find(x => x.ID_Murid === t.ID_Murid)) {
                    hasilUnik.push({ ID_Murid: t.ID_Murid, Nama_Santri: getNamaMutlak(t.ID_Murid, t.Nama_Santri) });
                }
            });

            hasilUnik.slice(0, 5).forEach(s => {
                let div = document.createElement('div'); div.className = 'sug-item';
                div.innerHTML = `<b>${s.Nama_Santri}</b> <span style="font-size:10px; color:var(--text-muted);">(${s.ID_Murid})</span>`;
                div.onclick = () => { 
                    box.style.display = 'none'; 
                    bukaTagihanSantri(s.ID_Murid, s.Nama_Santri); 
                };
                box.appendChild(div);
            });
            box.style.display = hasilUnik.length > 0 ? 'block' : 'none';
        }

        function renderFilter(id) {
            let wadah = document.getElementById('hasilPencarian');
            let res = listTagihan.filter(t => String(t.ID_Murid) === String(id));
            wadah.innerHTML = '';
            
            if(res.length === 0) {
                 wadah.innerHTML = '<p style="text-align:center; color:var(--c-green); font-size:12px; font-weight:700; margin-top:20px;"><i class="fa-solid fa-check-circle" style="font-size:30px; margin-bottom:10px;"></i><br>Tidak ada tagihan aktif untuk santri ini.</p>';
                 setTimeout(() => { kembaliKeDaftar(); }, 2000);
                 return;
            }

            res.forEach(t => {
                let sisa = t.Status === 'Cicilan' ? (parseInt(t.Nominal) - parseInt(t.Terbayar || 0)) : parseInt(t.Nominal);
                wadah.innerHTML += `<div class="card-tagihan">
                    <div><b style="font-family:'Montserrat'; font-size:13px;">${t.Nama_Pos}</b><br><span style="font-size:11px; color:var(--text-muted); font-weight:700;">${formatRupiah(sisa)}</span></div>
                    <button class="btn-beri" onclick="bukaModal('${t.ID_Tagihan}')">Bebaskan</button>
                </div>`;
            });
        }

        function bukaModal(id) { document.getElementById('mIdTagihan').value = id; document.getElementById('modalDisp').style.display = 'flex'; }
        function tutupModal() { document.getElementById('modalDisp').style.display = 'none'; }

        document.getElementById('formDisp').onsubmit = async (e) => {
            e.preventDefault();
            let id = document.getElementById('mIdTagihan').value;
            let alasan = document.getElementById('mAlasan').value;
            let adminName = localStorage.getItem('namaPengguna') || 'Admin Keuangan';
            
            let btn = document.querySelector('.btn-modal-ok');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> MEMPROSES...'; btn.disabled = true;

            try {
                await database.ref('tagihan/' + id).update({ 
                    Status: 'Dispensasi: ' + alasan, 
                    Tgl_Dispensasi: new Date().toLocaleString('id-ID'), 
                    Admin_Eksekutor: adminName 
                });
                
                tutupModal();
                showToast("Tagihan Berhasil Dibebaskan & Dicatat di Log!");
            } catch(err) {
                showToast("Gagal memproses ke server.");
            }
            
            btn.innerHTML = '<i class="fa-solid fa-check-double"></i> KONFIRMASI BEBASKAN'; btn.disabled = false;
        };

        function renderRiwayat() {
            let b = document.getElementById('bodyRiwayat'); b.innerHTML = '';
            
            if(listRiwayat.length === 0) {
                 b.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:var(--text-muted);">Belum ada riwayat pembebasan tagihan.</td></tr>';
                 return;
            }

            listRiwayat.sort((x,y) => new Date(y.Tgl_Dispensasi.split(' ')[0].split('/').reverse().join('-')) - new Date(x.Tgl_Dispensasi.split(' ')[0].split('/').reverse().join('-'))).forEach(r => {
                let sisaBebas = r.Status === 'Cicilan' ? (parseInt(r.Nominal) - parseInt(r.Terbayar || 0)) : parseInt(r.Nominal);
                let namaTampil = getNamaMutlak(r.ID_Murid, r.Nama_Santri);

                b.innerHTML += `<tr>
                    <td>${(r.Tgl_Dispensasi || '-').split(' ')[0]}<br><span style="font-size:9px; color:var(--text-muted);">Oleh: ${r.Admin_Eksekutor || '-'}</span></td>
                    <td><b>${namaTampil}</b><br><span style="font-size:9px; color:var(--c-orange);">${r.Status}</span></td>
                    <td>${r.Nama_Pos}</td>
                    <td style="text-align:right; text-decoration:line-through; color:#ef4444; font-weight:700;">${formatRupiah(sisaBebas)}</td>
                </tr>`;
            });
        }
        
        document.addEventListener('click', e => { if(e.target.id !== 'cariPintar') document.getElementById('sugBox').style.display = 'none'; });
    </script>
</body>
</html>
